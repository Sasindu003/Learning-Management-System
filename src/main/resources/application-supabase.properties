# -------------------------------------------------------------------
# Supabase (Postgres) profile
#
# Usage:
#   - Set env vars (recommended) then run with:
#       SPRING_PROFILES_ACTIVE=supabase
#
# Required env vars:
#   SUPABASE_DB_JDBC_URL=jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
#   SUPABASE_DB_USERNAME=postgres
#   SUPABASE_DB_PASSWORD=...
# -------------------------------------------------------------------

spring.datasource.url=${SUPABASE_DB_JDBC_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Supabase uses TLS; keep it on (configured in JDBC url via sslmode=require).

# H2 console is not applicable when using Postgres
spring.h2.console.enabled=false

