<!DOCTYPE html>
<!--
  ===================================================================
  EduFlow LMS — Login Page
  ===================================================================
  This is the entry point for all users (admins, teachers, students).

  To customise:
    - Change the welcome text in the left pane (.login-welcome-pane)
    - Adjust colours in /css/style.css (the :root variables at the top)
    - The form submits to /login (handled by Spring Security)
  ===================================================================
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to EduFlow LMS — your school learning management portal.">
    <title>EduFlow LMS — Sign In</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <!-- Changelog link (top-left corner) -->
    <a href="/changelog"
       class="badge badge-primary"
       style="position: absolute; top: 20px; left: 20px; z-index: 100; text-decoration: none; padding: 8px 16px; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.3s ease;"
       aria-label="View version 1.1.0 changelog">🎯 v1.1.0 — Changelog</a>

    <main class="login-page login-page-split" id="main-content">
        <div class="login-split-container">

            <!-- Left Pane: Welcome / Branding -->
            <div class="login-welcome-pane" aria-hidden="true">
                <div class="welcome-content">
                    <div class="logo-icon-large">E</div>
                    <h1>Welcome to EduFlow</h1>
                    <p>Your comprehensive portal for interactive learning, seamless assignments, and academic excellence.</p>
                </div>
            </div>

            <!-- Right Pane: Login Form -->
            <div class="login-form-pane">
                <div class="form-header">
                    <h2 id="login-heading">Sign In</h2>
                    <p class="subtitle">Enter your credentials to access your account</p>
                </div>

                <!--
                  Error / logout messages — these are shown by Spring Security
                  when login fails or the user logs out.
                -->
                <div th:if="${param.error}"
                     class="alert alert-danger"
                     id="login-error"
                     role="alert">
                    <span th:if="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null}" 
                          th:text="${session['SPRING_SECURITY_LAST_EXCEPTION'].message}">❌ Error</span>
                    <span th:unless="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null}">❌ Invalid username or password.</span>
                </div>
                <div th:if="${param.logout}"
                     class="alert alert-success"
                     role="status">
                    ✅ You have been logged out successfully.
                </div>

                <!--
                  Login form.
                  - method="post" is required for security (Spring Security enforces this).
                  - th:action generates the correct URL and includes a CSRF token automatically.
                  - data-validate triggers the client-side validation in app.js.
                -->
                <form th:action="@{/login}"
                      method="post"
                      data-validate
                      aria-labelledby="login-heading"
                      aria-describedby="login-error">

                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-control"
                               placeholder="Enter your username"
                               autocomplete="username"
                               required
                               autofocus>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter your password"
                               autocomplete="current-password"
                               required>
                    </div>

                    <div class="form-group" style="display:flex;align-items:center;gap:8px">
                        <input type="checkbox" id="remember-me" name="remember-me">
                        <label for="remember-me" style="font-size:13px;color:var(--text-secondary)">Remember me for 24 hours</label>
                    </div>

                    <button type="submit"
                            class="btn btn-primary btn-lg"
                            style="width: 100%; justify-content: center;">
                        Sign In →
                    </button>

                    <!-- Developer Quick Login Button (Dev Purpose Only) -->
                    <div style="margin-top: 15px; text-align: center;">
                        <a th:href="@{/dev/quick-login}"
                           class="btn btn-sm"
                           style="padding: 4px 12px; font-size: 12px; opacity: 0.6; background: #f0f0f0; border: 1px solid #ddd; color: #666; text-decoration: none; border-radius: 4px; transition: all 0.2s;"
                           onmouseover="this.style.opacity='1'; this.style.background='#e0e0e0'"
                           onmouseout="this.style.opacity='0.6'; this.style.background='#f0f0f0'">
                            🔧 Dev Admin Login
                        </a>
                    </div>
                </form>

                <!--
                  DEVELOPER NOTE:
                  Do NOT expose default credentials in a production build.
                  To change the default admin password, update DataInitializer.java
                  or reset it via the /admin/users/edit page once logged in.
                -->
            </div>
        </div>
    </main>

    <script th:src="@{/js/app.js}"></script>
</body>

</html>
