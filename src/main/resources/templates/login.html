<!DOCTYPE html>
<!--
  login.html — the login page for all users.
  
  Spring Security handles the POST /login automatically.
  We just need to provide the form with 'username' and 'password' fields.
  Error/success messages are shown based on URL parameters (?error, ?logout).
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('LMS - Login')}"></head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo and title -->
            <div class="login-header">
                <span class="login-icon">📚</span>
                <h1>Learning Management System</h1>
                <p class="login-subtitle">Sign in to your account</p>
            </div>

            <!-- Error message — shown when login fails -->
            <div th:if="${param.error}" class="alert alert-error">
                ❌ Invalid username or password. Please try again.
            </div>

            <!-- Success message — shown after logout -->
            <div th:if="${param.logout}" class="alert alert-success">
                ✅ You have been logged out successfully.
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required
                        autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>

            <p class="login-footer-text">
                Default admin: <strong>admin</strong> / <strong>admin123</strong>
            </p>
        </div>
    </div>
</body>

</html>
