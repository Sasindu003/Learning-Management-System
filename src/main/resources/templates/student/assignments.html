<!DOCTYPE html>
<!--
  student/assignments.html — Updated with submit/submitted status.
  Sprint 1: Shows "Submit" or "Submitted ✅" per assignment.
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Assignments')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>📝 Assignments</h1>
                <p class="page-subtitle">View and submit assignments from your teachers</p>
            </div>

            <div th:if="${#lists.isEmpty(assignments)}" class="empty-state-lg">
                <span class="empty-icon">📭</span>
                <p>No assignments posted yet. Enjoy the free time!</p>
            </div>

            <div class="content-grid">
                <div th:each="assignment : ${assignments}" class="content-card">
                    <div class="content-card-header">
                        <span class="content-icon">📝</span>
                        <span class="content-subject" th:text="${assignment.subject.name}">Math</span>
                    </div>
                    <h3 th:text="${assignment.title}">Homework: Chapter 5</h3>
                    <p class="content-description" th:text="${assignment.description}">
                        Complete problems 1-20 from textbook.
                    </p>
                    <div class="content-meta">
                        <span class="due-date">📅 Due: <strong
                                th:text="${assignment.dueDate}">2026-02-28</strong></span>
                        <span>👤 <span th:text="${assignment.createdBy?.fullName}">Teacher</span></span>
                    </div>
                    <div style="margin-top:1rem;">
                        <!-- Already submitted -->
                        <span
                            th:if="${submittedMap != null and submittedMap.containsKey(assignment.id) and submittedMap.get(assignment.id)}"
                            class="score-badge score-pass">✅ Submitted</span>
                        <!-- Not yet submitted -->
                        <a th:unless="${submittedMap != null and submittedMap.containsKey(assignment.id) and submittedMap.get(assignment.id)}"
                            th:href="@{/student/assignments/{id}(id=${assignment.id})}"
                            class="btn btn-primary btn-sm">View & Submit →</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
