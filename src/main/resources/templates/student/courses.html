<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('My Courses')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="card-grid">
                <div th:each="c : ${courses}" class="content-card">
                    <h4 th:text="${c.title}">Course</h4>
                    <p><span class="badge badge-primary" th:text="${c.subject.name}">Subject</span>
                        <span class="badge badge-info" th:text="${c.grade.name}">Grade</span>
                    </p>
                    <p class="text-muted" th:text="${c.description}">Description</p>
                    <p style="font-size:13px">Instructor: <strong th:text="${c.teacher.fullName}">Teacher</strong></p>
                    <div class="card-footer">
                        <a th:href="@{/student/courses/{id}(id=${c.id})}" class="btn btn-info btn-sm">View Course →</a>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(courses)}" class="glass-card">
                <div class="empty-state">
                    <div class="icon">📖</div>
                    <h4>No courses available</h4>
                    <p>Courses will appear here once assigned to your grade</p>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
