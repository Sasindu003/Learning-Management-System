<!DOCTYPE html>
<!-- student/take-quiz.html — The actual quiz-taking page with MCQ questions. -->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Take Quiz')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>📝 <span th:text="${quiz.title}">Chapter 5 Quiz</span></h1>
                <p class="page-subtitle">
                    Subject: <strong th:text="${quiz.subject.name}">Math</strong> ·
                    <span th:text="${questions.size()}">5</span> questions
                </p>
            </div>

            <form th:action="@{/student/quizzes/{id}/submit(id=${quiz.id})}" method="post">
                <div th:each="question, iterStat : ${questions}" class="card quiz-question-card">
                    <h3 class="quiz-question-title">
                        Question <span th:text="${iterStat.count}">1</span>
                    </h3>
                    <p class="quiz-question-text" th:text="${question.questionText}">
                        What is 2 + 2?
                    </p>
                    <div class="quiz-options">
                        <label class="quiz-option">
                            <input type="radio" th:name="'answer_' + ${question.id}" value="A" required>
                            <span class="quiz-option-label">A</span>
                            <span th:text="${question.optionA}">3</span>
                        </label>
                        <label class="quiz-option">
                            <input type="radio" th:name="'answer_' + ${question.id}" value="B">
                            <span class="quiz-option-label">B</span>
                            <span th:text="${question.optionB}">4</span>
                        </label>
                        <label class="quiz-option">
                            <input type="radio" th:name="'answer_' + ${question.id}" value="C">
                            <span class="quiz-option-label">C</span>
                            <span th:text="${question.optionC}">5</span>
                        </label>
                        <label class="quiz-option">
                            <input type="radio" th:name="'answer_' + ${question.id}" value="D">
                            <span class="quiz-option-label">D</span>
                            <span th:text="${question.optionD}">6</span>
                        </label>
                    </div>
                </div>

                <div class="quiz-submit-area">
                    <button type="submit" class="btn btn-primary btn-full"
                        onclick="return confirm('Are you sure you want to submit? You cannot retake this quiz.')">
                        Submit Quiz
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
