<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Assignment — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Submit Assignment')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="glass-card" style="max-width:640px">
                <div class="mb-3">
                    <h3 th:text="${assignment.title}">Assignment</h3>
                    <p class="text-muted" th:text="${assignment.description}">Description</p>
                    <div class="meta mt-1">
                        <span class="badge badge-primary" th:text="${assignment.course.subject.name}">Subject</span>
                        · Due: <strong th:text="${#temporals.format(assignment.dueDate, 'MMM dd, yyyy')}">Date</strong>
                        · Max: <strong th:text="${assignment.maxMarks}">100</strong> marks
                    </div>
                </div>
                <form th:action="@{/student/assignments/{id}/submit(id=${assignment.id})}" method="post"
                    enctype="multipart/form-data">
                    <div class="form-group"><label class="form-label">Upload File</label>
                        <input type="file" name="file" class="form-control">
                    </div>
                    <div class="form-group"><label class="form-label">Comments</label>
                        <textarea name="comments" class="form-control" rows="3"
                            placeholder="Any comments for the teacher..."></textarea>
                    </div>
                    <div class="inline-flex">
                        <button type="submit" class="btn btn-primary">Submit Assignment</button>
                        <a href="/student/assignments" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
