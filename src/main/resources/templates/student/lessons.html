<!DOCTYPE html>
<!--
  student/lessons.html — Student page to view all available lesson notes.
  Read-only — students can see what teachers have uploaded.
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Lesson Notes')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>📄 Lesson Notes</h1>
                <p class="page-subtitle">Browse lesson materials uploaded by your teachers</p>
            </div>

            <!-- Lesson Notes Cards -->
            <div th:if="${#lists.isEmpty(lessons)}" class="empty-state-lg">
                <span class="empty-icon">📭</span>
                <p>No lesson notes available yet. Check back later!</p>
            </div>

            <div class="content-grid">
                <div th:each="lesson : ${lessons}" class="content-card">
                    <div class="content-card-header">
                        <span class="content-icon">📄</span>
                        <span class="content-subject" th:text="${lesson.subject.name}">Math</span>
                    </div>
                    <h3 th:text="${lesson.title}">Chapter 5 — Trigonometry</h3>
                    <div class="content-meta">
                        <span>📁 <span th:text="${lesson.fileName}">notes.pdf</span></span>
                        <span>👤 <span th:text="${lesson.uploadedBy?.fullName}">Teacher</span></span>
                        <span>📅 <span th:text="${#temporals.format(lesson.uploadedAt, 'MMM dd, yyyy')}">Feb 20,
                                2026</span></span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
