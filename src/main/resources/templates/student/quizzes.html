<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Quizzes & Exams')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="glass-card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Exam</th>
                                <th>Course</th>
                                <th>Type</th>
                                <th>Duration</th>
                                <th>Total Marks</th>
                                <th>Status</th>
                                <th>Score</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="e : ${exams}">
                                <td><strong th:text="${e.title}">Exam</strong></td>
                                <td><span class="badge badge-primary" th:text="${e.course.subject.name}">Subject</span>
                                </td>
                                <td><span class="badge badge-info" th:text="${e.type}">QUIZ</span></td>
                                <td th:text="${e.durationMinutes} + ' min'">30</td>
                                <td th:text="${e.totalMarks}">100</td>
                                <td th:if="${attempted[e.id]}"><span class="badge badge-success">Completed</span></td>
                                <td th:unless="${attempted[e.id]}"><span class="badge badge-warning">Not
                                        Attempted</span></td>
                                <td th:if="${attempts[e.id] != null}">
                                    <strong
                                        th:text="${attempts[e.id].score} + '/' + ${attempts[e.id].totalMarks}">Score</strong>
                                    <br><small
                                        th:text="${#numbers.formatDecimal(attempts[e.id].percentage, 1, 1)} + '%'">%</small>
                                </td>
                                <td th:unless="${attempts[e.id] != null}">-</td>
                                <td th:unless="${attempted[e.id]}"><a
                                        th:href="@{/student/quizzes/{id}/take(id=${e.id})}"
                                        class="btn btn-warning btn-sm">Take Quiz</a></td>
                                <td th:if="${attempted[e.id]}"><span class="text-muted">Done</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(exams)}" class="empty-state">
                    <div class="icon">❓</div>
                    <h4>No quizzes available</h4>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
