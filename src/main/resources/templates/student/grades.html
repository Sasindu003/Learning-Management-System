<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Grades — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('My Grades')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="stats-grid" style="grid-template-columns:repeat(2,1fr)">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(gpa, 1, 1)} + '%'">0%</div>
                    <div class="stat-label">Overall Average</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📝</div>
                    <div class="stat-value" th:text="${#lists.size(grades)}">0</div>
                    <div class="stat-label">Total Records</div>
                </div>
            </div>
            <div class="glass-card">
                <h3 class="mb-2">📋 Grade Report</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Exam</th>
                                <th>Marks</th>
                                <th>Percentage</th>
                                <th>Grade</th>
                                <th>Term</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="g : ${grades}">
                                <td><span class="badge badge-primary" th:text="${g.subject.name}">Subject</span></td>
                                <td th:text="${g.examName}">Exam</td>
                                <td th:text="${g.marks} + '/' + ${g.maxMarks}">Marks</td>
                                <td>
                                    <div class="progress-bar"
                                        style="width:80px;display:inline-block;vertical-align:middle">
                                        <div class="progress-fill" th:style="'width:' + ${g.percentage} + '%'"></div>
                                    </div>
                                    <span th:text="${#numbers.formatDecimal(g.percentage, 1, 1)} + '%'">0%</span>
                                </td>
                                <td><span class="badge"
                                        th:classappend="${g.percentage >= 50} ? 'badge-success' : 'badge-danger'"
                                        th:text="${g.letterGrade}">A</span></td>
                                <td th:text="${g.term}">Term</td>
                                <td class="text-muted" th:text="${g.remarks ?: '-'}">Remarks</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(grades)}" class="empty-state">
                    <div class="icon">📊</div>
                    <h4>No grades recorded yet</h4>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
