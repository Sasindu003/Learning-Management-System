<!DOCTYPE html>
<!--
  dashboard-admin.html — Admin's home page after login.
  Shows quick stats (users, grades, subjects), quick action links, and announcements.
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Admin Dashboard')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <!-- Welcome Header -->
            <div class="page-header">
                <h1>Welcome, <span th:text="${user?.fullName ?: 'Admin'}">Admin</span>! 👋</h1>
                <p class="page-subtitle">Admin Dashboard — Manage your LMS</p>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card stat-card-blue">
                    <div class="stat-icon">👥</div>
                    <div class="stat-info">
                        <span class="stat-number" th:text="${totalUsers}">0</span>
                        <span class="stat-label">Total Users</span>
                    </div>
                </div>
                <div class="stat-card stat-card-green">
                    <div class="stat-icon">🎓</div>
                    <div class="stat-info">
                        <span class="stat-number" th:text="${totalGrades}">0</span>
                        <span class="stat-label">Grades</span>
                    </div>
                </div>
                <div class="stat-card stat-card-purple">
                    <div class="stat-icon">📖</div>
                    <div class="stat-info">
                        <span class="stat-number" th:text="${totalSubjects}">0</span>
                        <span class="stat-label">Subjects</span>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="section">
                <h2 class="section-title">Quick Actions</h2>
                <div class="action-grid">
                    <a th:href="@{/admin/grades}" class="action-card">
                        <span class="action-icon">🎓</span>
                        <span class="action-text">Manage Grades</span>
                    </a>
                    <a th:href="@{/admin/subjects}" class="action-card">
                        <span class="action-icon">📖</span>
                        <span class="action-text">Manage Subjects</span>
                    </a>
                    <a th:href="@{/admin/announcements}" class="action-card">
                        <span class="action-icon">📢</span>
                        <span class="action-text">Post Announcement</span>
                    </a>
                    <a th:href="@{/admin/users}" class="action-card">
                        <span class="action-icon">👤</span>
                        <span class="action-text">Manage Users</span>
                    </a>
                </div>
            </div>

            <!-- Announcements Section -->
            <div class="section">
                <h2 class="section-title">📢 Recent Announcements</h2>
                <!-- Show message if no announcements yet -->
                <div th:if="${#lists.isEmpty(announcements)}" class="empty-state">
                    <p>No announcements yet. Post the first one!</p>
                </div>
                <!-- Loop through each announcement -->
                <div th:each="announcement : ${announcements}" class="announcement-card">
                    <h3 th:text="${announcement.title}">Title</h3>
                    <p th:text="${announcement.content}">Content</p>
                    <div class="announcement-meta">
                        <span>Posted by <strong th:text="${announcement.postedBy?.fullName}">Admin</strong></span>
                        <span th:text="${#temporals.format(announcement.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
