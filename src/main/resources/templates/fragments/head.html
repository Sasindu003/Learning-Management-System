<!-- 
  head.html — shared <head> fragment used by every page.
  
  WHY a fragment? 
    - Every page needs the same CSS, fonts, and meta tags.
    - Fragments avoid copy-pasting the same <head> block everywhere.
    - To use it: <head th:replace="~{fragments/head :: head('Page Title')}">
-->
<head th:fragment="head(title)" xmlns:th="http://www.thymeleaf.org">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">LMS</title>
    <!-- Google Fonts — Inter is clean and modern -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Our custom stylesheet -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
