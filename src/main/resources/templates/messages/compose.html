<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compose Message — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Compose Message')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="glass-card" style="max-width:640px">
                <form th:action="@{/messages/send}" method="post" data-validate>
                    <div class="form-group"><label class="form-label">To *</label>
                        <select name="receiverId" class="form-control" required>
                            <option value="">Select recipient</option>
                            <option th:each="u : ${users}" th:value="${u.id}"
                                th:text="${u.fullName + ' (' + u.role + ')'}">User</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">Subject *</label>
                        <input type="text" name="subject" class="form-control" required placeholder="Message subject">
                    </div>
                    <div class="form-group"><label class="form-label">Message *</label>
                        <textarea name="content" class="form-control" rows="6" required
                            placeholder="Write your message..."></textarea>
                    </div>
                    <div class="inline-flex">
                        <button type="submit" class="btn btn-primary">Send Message</button>
                        <a href="/messages" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
