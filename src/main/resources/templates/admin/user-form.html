<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar(${user.id != null} ? 'Edit User' : 'Create User')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="glass-card" style="max-width:640px">
                <form th:action="@{/admin/users/save}" method="post" data-validate>
                    <input type="hidden" th:if="${user.id != null}" name="id" th:value="${user.id}">

                    <div class="form-group">
                        <label class="form-label">Role *</label>
                        <select name="role" class="form-control" required>
                            <option value="">Select Role</option>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"
                                th:selected="${user.role == r}">Role</option>
                        </select>
                    </div>

                    <div class="data-grid">
                        <div class="form-group">
                            <label class="form-label">Username *</label>
                            <input type="text" name="username" class="form-control" th:value="${user.username}" required
                                minlength="3" maxlength="50" th:readonly="${user.id != null}"
                                placeholder="e.g. john.smith">
                        </div>
                        <div class="form-group">
                            <label class="form-label"
                                th:text="${user.id != null} ? 'New Password (leave blank to keep)' : 'Password *'">Password</label>
                            <input type="password" name="password" class="form-control" th:required="${user.id == null}"
                                minlength="6" placeholder="Min 6 characters">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Full Name *</label>
                        <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required
                            placeholder="e.g. John Smith">
                    </div>

                    <div class="data-grid">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" th:value="${user.email}"
                                placeholder="e.g. john@school.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control" th:value="${user.phone}"
                                placeholder="e.g. +94771234567">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Grade (for Students)</label>
                        <select name="gradeId" class="form-control">
                            <option value="">No Grade</option>
                            <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}"
                                th:selected="${user.grade != null && user.grade.id == g.id}">Grade</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Subjects</label>
                        <div style="display:flex;flex-wrap:wrap;gap:12px">
                            <label th:each="s : ${subjects}"
                                style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary)">
                                <input type="checkbox" name="subjectIds" th:value="${s.id}"
                                    th:checked="${user.subjects != null && user.subjects.contains(s)}">
                                <span th:text="${s.name}">Subject</span>
                            </label>
                        </div>
                    </div>

                    <div class="inline-flex mt-2">
                        <button type="submit" class="btn btn-primary"
                            th:text="${user.id != null} ? 'Update User' : 'Create User'">Save</button>
                        <a href="/admin/users" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
