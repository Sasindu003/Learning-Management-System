<!DOCTYPE html>
<!--
  admin/grades.html — Admin page to manage grade levels.
  Has a form to add new grades and a table showing existing grades with delete buttons.
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Manage Grades')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>🎓 Manage Grades</h1>
                <p class="page-subtitle">Add or remove grade levels (e.g., Grade 10, Grade 11)</p>
            </div>

            <!-- Flash Messages -->
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Add Grade Form -->
            <div class="card form-card">
                <h2 class="card-title">Add New Grade</h2>
                <form th:action="@{/admin/grades}" method="post" class="inline-form">
                    <div class="form-group">
                        <label for="name">Grade Name</label>
                        <input type="text" id="name" name="name" placeholder="e.g., Grade 10" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Grade</button>
                </form>
            </div>

            <!-- Grades Table -->
            <div class="card">
                <h2 class="card-title">Existing Grades</h2>
                <div th:if="${#lists.isEmpty(grades)}" class="empty-state">
                    <p>No grades created yet. Add one above!</p>
                </div>
                <table th:unless="${#lists.isEmpty(grades)}" class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Grade Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="grade, iterStat : ${grades}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${grade.name}">Grade 10</td>
                            <td>
                                <form th:action="@{/admin/grades/delete/{id}(id=${grade.id})}" method="post"
                                    class="inline-form">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Delete this grade?')">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>

</html>
