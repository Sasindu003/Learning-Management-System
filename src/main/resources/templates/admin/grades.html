<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grades — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Grade Management')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="data-grid">
                <div class="glass-card">
                    <h3 class="mb-2">Add / Edit Grade</h3>
                    <form th:action="@{/admin/grades/save}" method="post" data-validate>
                        <div class="form-group">
                            <label class="form-label">Grade Name *</label>
                            <input type="text" name="name" class="form-control" required placeholder="e.g. Grade 1">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <input type="text" name="description" class="form-control"
                                placeholder="Optional description">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Grade</button>
                    </form>
                </div>
                <div class="glass-card">
                    <h3 class="mb-2">All Grades</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th>Students</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="g,iter : ${grades}">
                                    <td th:text="${iter.count}">1</td>
                                    <td><strong th:text="${g.name}">Grade</strong></td>
                                    <td class="text-muted" th:text="${g.description}">Desc</td>
                                    <td><span class="badge badge-info" th:text="${#lists.size(g.students)}">0</span>
                                    </td>
                                    <td><a th:href="@{/admin/grades/delete/{id}(id=${g.id})}"
                                            class="btn btn-danger btn-sm" data-confirm="Delete this grade?">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
