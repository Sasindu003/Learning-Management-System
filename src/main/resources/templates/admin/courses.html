<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Courses — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('All Courses')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="glass-card mb-3">
                <div class="flex-between mb-2">
                    <h3>📖 Courses Overview</h3>
                    <input type="text" id="course-search" class="form-control" placeholder="Search courses..."
                        style="max-width:300px"
                        oninput="filterTable(this.value)">
                </div>
                <div class="table-container">
                    <table id="courses-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Subject</th>
                                <th>Grade</th>
                                <th>Teacher</th>
                                <th>Status</th>
                                <th style="width: 80px">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${courses}">
                                <td><strong th:text="${c.title}">Title</strong></td>
                                <td><span class="badge badge-primary" th:text="${c.subject.name}">Subject</span></td>
                                <td><span class="badge badge-info" th:text="${c.grade.name}">Grade</span></td>
                                <td th:text="${c.teacher.fullName}">Teacher</td>
                                <td><span class="badge"
                                        th:classappend="${c.active} ? 'badge-success' : 'badge-danger'"
                                        th:text="${c.active} ? 'Active' : 'Inactive'">Status</span></td>
                                <td>
                                    <form th:action="@{/admin/courses/delete/{id}(id=${c.id})}" method="post"
                                        onsubmit="return confirm('Are you sure you want to delete this course? All materials, assignments, and files will be permanently removed.');">
                                        <button type="submit" class="btn-icon btn-danger" title="Delete Course">🗑️</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(courses)}" class="empty-state">
                    <p>No courses created yet</p>
                </div>
            </div>

            <div class="stats-grid" style="grid-template-columns:repeat(2,1fr)">
                <div class="stat-card">
                    <div class="stat-icon">📖</div>
                    <div class="stat-value" th:text="${#lists.size(courses)}">0</div>
                    <div class="stat-label">Total Courses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" th:text="${#lists.size(courses.?[active])}">0</div>
                    <div class="stat-label">Active Courses</div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
    <script>
        function filterTable(query) {
            const rows = document.querySelectorAll('#courses-table tbody tr');
            const q = query.toLowerCase();
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(q) ? '' : 'none';
            });
        }
    </script>
</body>

</html>
