<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Events')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="data-grid">
                <div class="glass-card">
                    <h3 class="mb-2">Create Event</h3>
                    <form th:action="@{/admin/events/save}" method="post" data-validate>
                        <div class="form-group"><label class="form-label">Title *</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>
                        <div class="form-group"><label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="data-grid">
                            <div class="form-group"><label class="form-label">Date *</label>
                                <input type="date" name="eventDate" class="form-control" required>
                            </div>
                            <div class="form-group"><label class="form-label">Time</label>
                                <input type="text" name="eventTime" class="form-control" placeholder="e.g. 10:00 AM">
                            </div>
                        </div>
                        <div class="form-group"><label class="form-label">Type</label>
                            <select name="type" class="form-control">
                                <option value="GENERAL">General</option>
                                <option value="HOLIDAY">Holiday</option>
                                <option value="EXAM">Exam</option>
                                <option value="MEETING">Meeting</option>
                                <option value="SPORTS">Sports</option>
                                <option value="CULTURAL">Cultural</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Event</button>
                    </form>
                </div>
                <div class="glass-card">
                    <h3 class="mb-2">All Events</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Title</th>
                                    <th>Type</th>
                                    <th>Time</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="e : ${events}">
                                    <td th:text="${#temporals.format(e.eventDate, 'MMM dd, yyyy')}">Date</td>
                                    <td><strong th:text="${e.title}">Title</strong></td>
                                    <td><span class="badge badge-info" th:text="${e.type}">Type</span></td>
                                    <td th:text="${e.eventTime ?: 'All Day'}">Time</td>
                                    <td><a th:href="@{/admin/events/delete/{id}(id=${e.id})}"
                                            class="btn btn-danger btn-sm" data-confirm="Delete?">Delete</a></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
