<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Announcements')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="data-grid">
                <div class="glass-card">
                    <h3 class="mb-2">Post Announcement</h3>
                    <form th:action="@{/admin/announcements/save}" method="post" data-validate>
                        <div class="form-group"><label class="form-label">Title *</label>
                            <input type="text" name="title" class="form-control" required
                                placeholder="Announcement title">
                        </div>
                        <div class="form-group"><label class="form-label">Content *</label>
                            <textarea name="content" class="form-control" required rows="4"
                                placeholder="Write your announcement..."></textarea>
                        </div>
                        <div class="data-grid">
                            <div class="form-group"><label class="form-label">Target Audience</label>
                                <select name="targetAudience" class="form-control">
                                    <option value="ALL">Everyone</option>
                                    <option value="STUDENTS">Students Only</option>
                                    <option value="TEACHERS">Teachers Only</option>
                                    <option value="ADMIN">Admins Only</option>
                                </select>
                            </div>
                            <div class="form-group"><label class="form-label">&nbsp;</label>
                                <label
                                    style="display:flex;align-items:center;gap:8px;padding:10px;font-size:14px;color:var(--text-secondary)">
                                    <input type="checkbox" name="pinned" value="true"> Pin this announcement
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Publish</button>
                    </form>
                </div>
                <div class="glass-card">
                    <h3 class="mb-2">All Announcements</h3>
                    <div th:each="a : ${announcements}" class="announcement-card"
                        th:classappend="${a.pinned} ? 'pinned'" style="margin-bottom:16px">
                        <div class="flex-between">
                            <h5 th:text="${a.title}">Title</h5>
                            <a th:href="@{/admin/announcements/delete/{id}(id=${a.id})}" class="btn btn-danger btn-sm"
                                data-confirm="Delete?">×</a>
                        </div>
                        <p th:text="${a.content}" style="white-space:pre-line">Content</p>
                        <div class="meta mt-1">
                            <span class="badge badge-primary" th:text="${a.targetAudience}">ALL</span>
                            · By <span th:text="${a.author.fullName}">Author</span>
                            · <span th:text="${#temporals.format(a.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                            <span th:if="${a.pinned}"> · 📌 Pinned</span>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(announcements)}" class="empty-state">
                        <p>No announcements</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
