<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Academic Terms')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="data-grid">
                <div class="glass-card">
                    <h3 class="mb-2" id="formTitle">Add Term</h3>
                    <form th:action="@{/admin/terms/save}" method="post" id="termForm" data-validate>
                        <input type="hidden" name="id" id="termId">
                        <div class="form-group"><label class="form-label">Term Name *</label>
                            <input type="text" name="name" id="termName" class="form-control" required
                                placeholder="e.g. Term 1 - 2026">
                        </div>
                        <div class="data-grid">
                            <div class="form-group"><label class="form-label">Start Date *</label>
                                <input type="date" name="startDate" id="termStartDate" class="form-control" required>
                            </div>
                            <div class="form-group"><label class="form-label">End Date *</label>
                                <input type="date" name="endDate" id="termEndDate" class="form-control" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label
                                style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-secondary)">
                                <input type="checkbox" name="active" id="termActive" value="true"> Set as Active Term
                            </label>
                        </div>
                        <div class="flex-between">
                            <button type="submit" class="btn btn-primary" id="submitBtn">Save Term</button>
                            <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none" onclick="resetForm()">Cancel</button>
                        </div>
                    </form>
                </div>
                <div class="glass-card">
                    <h3 class="mb-2">All Terms</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Start</th>
                                    <th>End</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="t : ${terms}">
                                    <td><strong th:text="${t.name}">Term</strong></td>
                                    <td th:text="${#temporals.format(t.startDate, 'MMM dd, yyyy')}">Start</td>
                                    <td th:text="${#temporals.format(t.endDate, 'MMM dd, yyyy')}">End</td>
                                    <td><span class="badge"
                                            th:classappend="${t.active} ? 'badge-success' : 'badge-info'"
                                            th:text="${t.active} ? 'Active' : 'Inactive'">Status</span></td>
                                    <td class="inline-flex">
                                        <button class="btn btn-sm btn-info" th:onclick="'editTerm(' + ${t.id} + ')'">Edit</button>
                                        <form th:action="@{/admin/terms/toggle/{id}(id=${t.id})}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-sm" 
                                                th:classappend="${t.active} ? 'btn-secondary' : 'btn-success'"
                                                th:text="${t.active} ? 'Deactivate' : 'Activate'">Toggle</button>
                                        </form>
                                        <a th:href="@{/admin/terms/delete/{id}(id=${t.id})}"
                                            class="btn btn-danger btn-sm" data-confirm="Delete?">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
    <script>
        function editTerm(id) {
            fetch('/admin/terms/edit/' + id)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('termId').value = data.id;
                    document.getElementById('termName').value = data.name;
                    document.getElementById('termStartDate').value = data.startDate;
                    document.getElementById('termEndDate').value = data.endDate;
                    document.getElementById('termActive').checked = data.active;
                    
                    document.getElementById('formTitle').innerText = 'Edit Term';
                    document.getElementById('submitBtn').innerText = 'Update Term';
                    document.getElementById('cancelBtn').style.display = 'block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
        }

        function resetForm() {
            document.getElementById('termId').value = '';
            document.getElementById('termForm').reset();
            document.getElementById('formTitle').innerText = 'Add Term';
            document.getElementById('submitBtn').innerText = 'Save Term';
            document.getElementById('cancelBtn').style.display = 'none';
        }
    </script>
</body>

</html>
