<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Types — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <main class="main-content" id="main-content">
        <div th:replace="~{fragments/layout :: topbar('🎨 Event Types')}"></div>
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="data-grid" style="max-width:900px;">

            <!-- Create / Edit Form -->
            <div class="glass-card">
                <h3 class="mb-2">Create Event Type</h3>
                <p style="color:#6b7280; font-size:14px; margin-bottom:16px;">
                    Define categories used by calendar events and entries. Both admins and users benefit from consistent types.
                </p>
                <form th:action="@{/admin/event-types/save}" method="post" data-validate>
                    <input type="hidden" name="id" id="edit-id" value="">
                    <div style="display:grid; grid-template-columns:1fr auto auto; gap:12px; align-items:end;">
                        <div class="form-group" style="margin:0;">
                            <label class="form-label">Type Name *</label>
                            <input type="text" name="name" id="edit-name" class="form-control"
                                   placeholder="e.g. Study Session, Exam, Holiday" required>
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label class="form-label">Color</label>
                            <input type="color" name="color" id="edit-color" class="form-control"
                                   value="#6366f1" style="width:60px; height:42px; padding:4px; cursor:pointer;">
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label class="form-label">Icon (Emoji)</label>
                            <input type="text" name="icon" id="edit-icon" class="form-control"
                                   value="📅" maxlength="4" style="width:64px; text-align:center; font-size:22px;">
                        </div>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:16px;">
                        <button type="submit" class="btn btn-primary" id="save-btn">Create Type</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()" id="cancel-btn" style="display:none;">Cancel Edit</button>
                    </div>
                </form>
            </div>

            <!-- Types List -->
            <div class="glass-card">
                <h3 class="mb-2">All Event Types</h3>
                <div th:if="${#lists.isEmpty(eventTypes)}" class="empty-state">
                    No event types yet. Create one above to get started.
                </div>
                <div class="table-container" th:unless="${#lists.isEmpty(eventTypes)}">
                    <table>
                        <thead>
                            <tr>
                                <th>Preview</th>
                                <th>Name</th>
                                <th>Color</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="t : ${eventTypes}">
                                <td>
                                    <span th:text="${t.icon + ' ' + t.name}"
                                          style="padding: 4px 12px; border-radius: 100px; font-size:14px; font-weight:600; color:white;"
                                          th:style="|background:${t.color}; padding:4px 12px; border-radius:100px; font-size:14px; font-weight:600; color:white;|">
                                    </span>
                                </td>
                                <td th:text="${t.name}">Name</td>
                                <td>
                                    <span th:style="|display:inline-block;width:20px;height:20px;border-radius:4px;background:${t.color};vertical-align:middle;|"></span>
                                    <span th:text="${t.color}" style="font-size:13px; color:#6b7280; margin-left:6px;"></span>
                                </td>
                                <td>
                                    <button class="btn btn-secondary btn-sm"
                                            th:onclick="|editType(${t.id}, '${t.name}', '${t.color}', '${t.icon}')|">
                                        ✏️ Edit
                                    </button>
                                    <a th:href="@{/admin/event-types/delete/{id}(id=${t.id})}"
                                       class="btn btn-danger btn-sm" data-confirm="Delete this event type?">
                                        🗑 Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
    function editType(id, name, color, icon) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-name').value = name;
        document.getElementById('edit-color').value = color;
        document.getElementById('edit-icon').value = icon;
        document.getElementById('save-btn').textContent = 'Update Type';
        document.getElementById('cancel-btn').style.display = 'inline-block';
        document.getElementById('edit-name').focus();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.getElementById('edit-name').value = '';
        document.getElementById('edit-color').value = '#6366f1';
        document.getElementById('edit-icon').value = '📅';
        document.getElementById('save-btn').textContent = 'Create Type';
        document.getElementById('cancel-btn').style.display = 'none';
    }
</script>
</body>
</html>
