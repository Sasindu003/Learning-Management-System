<!DOCTYPE html>
<!--
  admin/users.html — Admin page with active/suspended status toggle.
  Sprint 1: Added status badge and toggle button per user.
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Manage Users')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>👤 Manage Users</h1>
                <p class="page-subtitle">Create, suspend, or delete user accounts</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Create User Form -->
            <div class="card form-card">
                <h2 class="card-title">Create New User</h2>
                <form th:action="@{/admin/users}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" name="fullName" placeholder="e.g., John Smith" required>
                        </div>
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="e.g., john.smith" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Set a password" required>
                        </div>
                        <div class="form-group">
                            <label for="role">Role</label>
                            <select id="role" name="role" required>
                                <option value="">-- Select Role --</option>
                                <option value="TEACHER">Teacher</option>
                                <option value="STUDENT">Student</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </form>
            </div>

            <!-- Users Table -->
            <div class="card">
                <h2 class="card-title">All Users</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Full Name</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u, iterStat : ${users}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${u.fullName}">John Smith</td>
                            <td th:text="${u.username}">john</td>
                            <td>
                                <span class="role-badge"
                                    th:classappend="${u.role.name() == 'ADMIN'} ? 'role-admin' : (${u.role.name() == 'TEACHER'} ? 'role-teacher' : 'role-student')"
                                    th:text="${u.role}">ADMIN</span>
                            </td>
                            <td>
                                <span class="status-badge"
                                    th:classappend="${u.active} ? 'status-active' : 'status-suspended'"
                                    th:text="${u.active} ? 'Active' : 'Suspended'">Active</span>
                            </td>
                            <td class="action-buttons">
                                <form th:action="@{/admin/users/toggle/{id}(id=${u.id})}" method="post"
                                    class="inline-form">
                                    <button type="submit"
                                        th:class="${u.active} ? 'btn btn-warning btn-sm' : 'btn btn-success btn-sm'"
                                        th:text="${u.active} ? 'Suspend' : 'Activate'">
                                        Toggle
                                    </button>
                                </form>
                                <form th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post"
                                    class="inline-form">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Delete this user?')">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>

</html>
