<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable Management — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Timetable Management')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="data-grid">
                <div class="glass-card">
                    <h3 class="mb-2">➕ Add Timetable Slot</h3>
                    <form th:action="@{/admin/timetable/save}" method="post" data-validate>
                        <div class="data-grid">
                            <div class="form-group">
                                <label class="form-label">Grade *</label>
                                <select name="gradeId" class="form-control" required>
                                    <option value="">Select Grade</option>
                                    <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}">Grade</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Subject *</label>
                                <select name="subjectId" class="form-control" required>
                                    <option value="">Select Subject</option>
                                    <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.name}">Subject</option>
                                </select>
                            </div>
                        </div>
                        <div class="data-grid">
                            <div class="form-group">
                                <label class="form-label">Teacher *</label>
                                <select name="teacherId" class="form-control" required>
                                    <option value="">Select Teacher</option>
                                    <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.fullName}">Teacher</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Day of Week *</label>
                                <select name="dayOfWeek" class="form-control" required>
                                    <option value="MONDAY">Monday</option>
                                    <option value="TUESDAY">Tuesday</option>
                                    <option value="WEDNESDAY">Wednesday</option>
                                    <option value="THURSDAY">Thursday</option>
                                    <option value="FRIDAY">Friday</option>
                                    <option value="SATURDAY">Saturday</option>
                                </select>
                            </div>
                        </div>
                        <div class="data-grid">
                            <div class="form-group">
                                <label class="form-label">Start Time *</label>
                                <input type="time" name="startTime" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">End Time *</label>
                                <input type="time" name="endTime" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Room</label>
                                <input type="text" name="room" class="form-control" placeholder="Room number">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Slot</button>
                    </form>
                </div>

                <div class="glass-card">
                    <h3 class="mb-2">📅 All Timetable Entries</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Day</th>
                                    <th>Time</th>
                                    <th>Grade</th>
                                    <th>Subject</th>
                                    <th>Teacher</th>
                                    <th>Room</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="tt : ${timetableEntries}">
                                    <td><span class="badge badge-info" th:text="${tt.dayOfWeek}">MON</span></td>
                                    <td th:text="${tt.startTime} + ' - ' + ${tt.endTime}">08:00-09:00</td>
                                    <td th:text="${tt.grade.name}">Grade</td>
                                    <td><span class="badge badge-primary" th:text="${tt.subject.name}">Subject</span></td>
                                    <td th:text="${tt.teacher.fullName}">Teacher</td>
                                    <td th:text="${tt.room ?: '-'}">Room</td>
                                    <td>
                                        <a th:href="@{/admin/timetable/delete/{id}(id=${tt.id})}"
                                            class="btn btn-danger btn-sm" data-confirm="Delete?">×</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${#lists.isEmpty(timetableEntries)}" class="empty-state">
                        <p>No timetable entries yet</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
