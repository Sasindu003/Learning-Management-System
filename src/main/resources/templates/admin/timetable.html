<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable Management — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Timetable Management')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="data-grid">
                <div class="glass-card">
                    <h3 class="mb-2" id="formTitle">➕ Add Timetable Slot</h3>
                    <form th:action="@{/admin/timetable/save}" method="post" data-validate>
                        <input type="hidden" name="id" id="entryId">
                        <div class="data-grid">
                            <div class="form-group">
                                <label class="form-label">Teacher *</label>
                                <select name="teacherId" id="teacherSelect" class="form-control" required>
                                    <option value="">Select Teacher</option>
                                    <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.fullName}">Teacher</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Day of Week *</label>
                                <select name="dayOfWeek" class="form-control" required>
                                    <option value="MONDAY">Monday</option>
                                    <option value="TUESDAY">Tuesday</option>
                                    <option value="WEDNESDAY">Wednesday</option>
                                    <option value="THURSDAY">Thursday</option>
                                    <option value="FRIDAY">Friday</option>
                                    <option value="SATURDAY">Saturday</option>
                                </select>
                            </div>
                        </div>
                        <div class="data-grid">
                            <div class="form-group">
                                <label class="form-label">Grade *</label>
                                <select name="gradeId" id="gradeSelect" class="form-control" required disabled>
                                    <option value="">Select Teacher First</option>
                                    <!-- Options populated by JS -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Subject *</label>
                                <select name="subjectId" id="subjectSelect" class="form-control" required disabled>
                                    <option value="">Select Teacher First</option>
                                    <!-- Options populated by JS -->
                                </select>
                            </div>
                        </div>
                        <div class="data-grid">
                            <div class="form-group">
                                <label class="form-label">Start Time *</label>
                                <input type="time" name="startTime" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">End Time *</label>
                                <input type="time" name="endTime" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Room</label>
                                <input type="text" name="room" class="form-control" placeholder="Room number">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" id="submitBtn">Add Slot</button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none" onclick="resetForm()">Cancel</button>
                    </form>
                </div>

                <div class="glass-card">
                    <h3 class="mb-2">📅 All Timetable Entries</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Day</th>
                                    <th>Time</th>
                                    <th>Grade</th>
                                    <th>Subject</th>
                                    <th>Teacher</th>
                                    <th>Room</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="tt : ${timetableEntries}">
                                    <td><span class="badge badge-info" th:text="${tt.dayOfWeek}">MON</span></td>
                                    <td th:text="${tt.startTime} + ' - ' + ${tt.endTime}">08:00-09:00</td>
                                    <td th:text="${tt.grade.name}">Grade</td>
                                    <td><span class="badge badge-primary" th:text="${tt.subject.name}">Subject</span></td>
                                    <td th:text="${tt.teacher.fullName}">Teacher</td>
                                    <td th:text="${tt.room ?: '-'}">Room</td>
                                    <td>
                                        <button class="btn btn-info btn-sm" th:onclick="'editTimetable(' + ${tt.id} + ')'">Edit</button>
                                        <a th:href="@{/admin/timetable/delete/{id}(id=${tt.id})}"
                                            class="btn btn-danger btn-sm" data-confirm="Delete?">×</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${#lists.isEmpty(timetableEntries)}" class="empty-state">
                        <p>No timetable entries yet</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form[data-validate]');
            if (form) {
                form.addEventListener('submit', (e) => {
                    const start = form.querySelector('[name="startTime"]').value;
                    const end = form.querySelector('[name="endTime"]').value;
                    if (start && end && start >= end) {
                        e.preventDefault();
                        alert('End time must be after start time.');
                    }
                });
            }

            const teacherSelect = document.getElementById('teacherSelect');
            const gradeSelect = document.getElementById('gradeSelect');
            const subjectSelect = document.getElementById('subjectSelect');

            if (teacherSelect && gradeSelect && subjectSelect) {
                teacherSelect.addEventListener('change', async (e) => {
                    const teacherId = e.target.value;
                    if (!teacherId) {
                        gradeSelect.disabled = true;
                        gradeSelect.innerHTML = '<option value="">Select Teacher First</option>';
                        subjectSelect.disabled = true;
                        subjectSelect.innerHTML = '<option value="">Select Teacher First</option>';
                        return;
                    }

                    try {
                        const response = await fetch(`/admin/teachers/${teacherId}/assignments`);
                        const data = await response.json();
                        
                        gradeSelect.disabled = false;
                        gradeSelect.innerHTML = '<option value="">Select Grade</option>' + 
                            data.grades.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
                            
                        subjectSelect.disabled = false;
                        subjectSelect.innerHTML = '<option value="">Select Subject</option>' + 
                            data.subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                    } catch (error) {
                        console.error('Error fetching assignments:', error);
                    }
                });
            }
        });

        async function editTimetable(id) {
            try {
                const response = await fetch(`/admin/timetable/edit/${id}`);
                const data = await response.json();
                
                document.getElementById('formTitle').innerText = '✏️ Edit Timetable Slot';
                document.getElementById('submitBtn').innerText = 'Update Slot';
                document.getElementById('cancelBtn').style.display = 'inline-block';
                document.getElementById('entryId').value = data.id;
                
                const teacherSelect = document.getElementById('teacherSelect');
                teacherSelect.value = data.teacherId;
                
                // Trigger change to populate grades and subjects
                const changeEvent = new Event('change');
                teacherSelect.dispatchEvent(changeEvent);
                
                // Wait for async selects to populate
                setTimeout(() => {
                    document.getElementById('gradeSelect').value = data.gradeId;
                    document.getElementById('subjectSelect').value = data.subjectId;
                }, 500);
                
                document.querySelector('[name="dayOfWeek"]').value = data.dayOfWeek;
                document.querySelector('[name="startTime"]').value = data.startTime;
                document.querySelector('[name="endTime"]').value = data.endTime;
                document.querySelector('[name="room"]').value = data.room || '';
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                console.error('Error fetching timetable entry:', error);
            }
        }

        function resetForm() {
            document.getElementById('formTitle').innerText = '➕ Add Timetable Slot';
            document.getElementById('submitBtn').innerText = 'Add Slot';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('entryId').value = '';
            document.querySelector('form[data-validate]').reset();
            
            const gradeSelect = document.getElementById('gradeSelect');
            const subjectSelect = document.getElementById('subjectSelect');
            gradeSelect.disabled = true;
            gradeSelect.innerHTML = '<option value="">Select Teacher First</option>';
            subjectSelect.disabled = true;
            subjectSelect.innerHTML = '<option value="">Select Teacher First</option>';
        }
    </script>
</body>

</html>
