<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Subject Management')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="data-grid">
                <div class="glass-card">
                    <h3 class="mb-2">Add Subject</h3>
                    <form th:action="@{/admin/subjects/save}" method="post" data-validate>
                        <div class="form-group"><label class="form-label">Subject Name *</label>
                            <input type="text" name="name" class="form-control" required placeholder="e.g. Mathematics">
                        </div>
                        <div class="form-group"><label class="form-label">Code *</label>
                            <input type="text" name="code" class="form-control" required placeholder="e.g. MATH"
                                maxlength="20">
                        </div>
                        <div class="form-group"><label class="form-label">Description</label>
                            <input type="text" name="description" class="form-control" placeholder="Optional">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Subject</button>
                    </form>
                </div>
                <div class="glass-card">
                    <h3 class="mb-2">All Subjects</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="s : ${subjects}">
                                    <td><span class="badge badge-primary" th:text="${s.code}">CODE</span></td>
                                    <td th:text="${s.name}">Name</td>
                                    <td class="text-muted" th:text="${s.description}">Desc</td>
                                    <td><a th:href="@{/admin/subjects/delete/{id}(id=${s.id})}"
                                            class="btn btn-danger btn-sm" data-confirm="Delete?">Delete</a></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
