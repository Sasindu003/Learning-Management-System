<!DOCTYPE html>
<!--
  admin/subjects.html — Admin page to manage subjects.
  Each subject belongs to a grade (selected from a dropdown).
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Manage Subjects')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>📖 Manage Subjects</h1>
                <p class="page-subtitle">Add subjects to grade levels (e.g., Mathematics for Grade 10)</p>
            </div>

            <!-- Flash Messages -->
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Add Subject Form -->
            <div class="card form-card">
                <h2 class="card-title">Add New Subject</h2>
                <form th:action="@{/admin/subjects}" method="post" class="inline-form">
                    <div class="form-group">
                        <label for="name">Subject Name</label>
                        <input type="text" id="name" name="name" placeholder="e.g., Mathematics" required>
                    </div>
                    <div class="form-group">
                        <label for="gradeId">Grade</label>
                        <select id="gradeId" name="gradeId" required>
                            <option value="">-- Select Grade --</option>
                            <option th:each="grade : ${grades}" th:value="${grade.id}" th:text="${grade.name}">Grade 10
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Subject</button>
                </form>
            </div>

            <!-- Subjects Table -->
            <div class="card">
                <h2 class="card-title">Existing Subjects</h2>
                <div th:if="${#lists.isEmpty(subjects)}" class="empty-state">
                    <p>No subjects created yet. Add grades first, then add subjects!</p>
                </div>
                <table th:unless="${#lists.isEmpty(subjects)}" class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Subject Name</th>
                            <th>Grade</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="subject, iterStat : ${subjects}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${subject.name}">Math</td>
                            <td th:text="${subject.grade.name}">Grade 10</td>
                            <td>
                                <form th:action="@{/admin/subjects/delete/{id}(id=${subject.id})}" method="post"
                                    class="inline-form">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Delete this subject?')">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>

</html>
