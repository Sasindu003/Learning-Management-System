<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Edit Profile')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="data-grid" style="max-width:900px">
                <div class="glass-card">
                    <h3 class="mb-2">Personal Info</h3>
                    <form th:action="@{/profile/update}" method="post" data-validate>
                        <div class="form-group"><label class="form-label">Full Name *</label>
                            <input type="text" name="fullName" class="form-control" th:value="${user.fullName}"
                                required>
                        </div>
                        <div class="form-group"><label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" th:value="${user.email}">
                        </div>
                        <div class="form-group"><label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control" th:value="${user.phone}">
                        </div>
                        <div class="form-group"><label class="form-label">Address</label>
                            <textarea name="address" class="form-control" rows="2" th:text="${user.address}"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>
                <div class="glass-card">
                    <h3 class="mb-2">🔒 Change Password</h3>
                    <form th:action="@{/profile/change-password}" method="post" data-validate>
                        <div class="form-group"><label class="form-label">Current Password *</label>
                            <input type="password" name="currentPassword" class="form-control" required>
                        </div>
                        <div class="form-group"><label class="form-label">New Password *</label>
                            <input type="password" name="newPassword" class="form-control" required minlength="6">
                        </div>
                        <div class="form-group"><label class="form-label">Confirm Password *</label>
                            <input type="password" name="confirmPassword" class="form-control" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-warning">Change Password</button>
                    </form>
                </div>
            </div>
            <div class="mt-2"><a href="/profile" class="btn btn-secondary">← Back to Profile</a></div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
