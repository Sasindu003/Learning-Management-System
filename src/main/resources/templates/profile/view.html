<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('My Profile')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="glass-card" style="max-width:640px">
                <div style="text-align:center;margin-bottom:24px">
                    <div class="user-avatar" style="width:80px;height:80px;font-size:32px;margin:0 auto 12px"
                        th:text="${user.fullName.substring(0,1)}">A</div>
                    <h3 th:text="${user.fullName}">Name</h3>
                    <p class="text-muted"><span class="badge badge-primary" th:text="${user.role}">ROLE</span>
                        <span th:if="${user.primaryId}" class="badge badge-info" th:text="${user.primaryId}">ID</span>
                    </p>
                </div>
                <div class="data-grid">
                    <div><span class="form-label">Username</span>
                        <p th:text="${user.username}">user</p>
                    </div>
                    <div><span class="form-label">Email</span>
                        <p th:text="${user.email ?: 'Not set'}">email</p>
                    </div>
                    <div><span class="form-label">Phone</span>
                        <p th:text="${user.phone ?: 'Not set'}">phone</p>
                    </div>
                    <div><span class="form-label">Address</span>
                        <p th:text="${user.address ?: 'Not set'}">address</p>
                    </div>
                    <div th:if="${user.grade != null}"><span class="form-label">Grade</span>
                        <p th:text="${user.grade.name}">grade</p>
                    </div>
                    <div th:if="${user.subjects != null && !user.subjects.isEmpty()}"><span
                            class="form-label">Subjects</span>
                        <p><span th:each="s,iter : ${user.subjects}"
                                th:text="${s.name + (iter.last ? '' : ', ')}">Sub</span></p>
                    </div>
                </div>
                <div class="mt-3"><a href="/profile/edit" class="btn btn-primary">Edit Profile</a></div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
