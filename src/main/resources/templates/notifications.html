<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Notifications')}"></div>
            <div class="flex-between mb-3">
                <span class="badge badge-info" th:text="${unreadNotifications} + ' unread'">0 unread</span>
                <a href="/notifications/read-all" class="btn btn-secondary btn-sm"
                    th:if="${unreadNotifications > 0}">Mark All Read</a>
            </div>
            <div class="glass-card">
                <div th:each="n : ${notifications}" class="announcement-card" style="margin-bottom:12px"
                    th:style="${!n.read} ? 'border-left-color:var(--primary);background:rgba(99,102,241,0.08)'">
                    <div class="flex-between">
                        <div>
                            <span class="badge" th:classappend="${n.type.name() == 'MESSAGE'} ? 'badge-info' :
                    (${n.type.name() == 'ASSIGNMENT'} ? 'badge-warning' :
                    (${n.type.name() == 'EXAM'} ? 'badge-danger' :
                    (${n.type.name() == 'ANNOUNCEMENT'} ? 'badge-primary' : 'badge-info')))"
                                th:text="${n.type}">TYPE</span>
                            <span th:text="${n.message}" style="margin-left:8px;font-size:14px">Notification</span>
                        </div>
                        <div class="inline-flex" style="align-items:center">
                            <small class="text-muted"
                                th:text="${#temporals.format(n.createdAt, 'MMM dd HH:mm')}">Time</small>
                            <a th:unless="${n.read}" th:href="@{/notifications/read/{id}(id=${n.id})}"
                                class="btn btn-secondary btn-sm">✓</a>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(notifications)}" class="empty-state">
                    <div class="icon">🔔</div>
                    <h4>No notifications</h4>
                    <p>You're all caught up!</p>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
