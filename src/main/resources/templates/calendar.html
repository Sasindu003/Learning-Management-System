<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- FullCalendar v6 -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <style>
        .calendar-wrapper {
            background: var(--glass-bg, rgba(255,255,255,0.7));
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border, rgba(255,255,255,0.4));
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        #calendar { min-height: 600px; }
        .fc .fc-button-primary { background: var(--accent, #6366f1); border-color: var(--accent, #6366f1); }
        .fc .fc-button-primary:hover { background: #4f46e5; border-color: #4f46e5; }
        .fc .fc-button-primary:not(:disabled).fc-button-active { background: #4338ca; border-color: #4338ca; }
        .fc-day-today { background: rgba(99,102,241,0.06) !important; }
        .fc-event { cursor: pointer; border-radius: 6px !important; font-size: 13px; }

        /* Event Detail Side Panel */
        #event-panel {
            position: fixed; top: 80px; right: -380px;
            width: 360px; background: white;
            border-radius: 20px 0 0 20px;
            box-shadow: -8px 0 32px rgba(0,0,0,0.12);
            padding: 28px; z-index: 1050;
            transition: right 0.35s cubic-bezier(.4,0,.2,1);
        }
        #event-panel.open { right: 0; }
        .panel-source-badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 100px; font-size: 12px; font-weight: 600;
            margin-bottom: 12px;
        }
        .source-personal { background: rgba(99,102,241,0.12); color: #6366f1; }
        .source-shared   { background: rgba(16,185,129,0.12);  color: #10b981; }
        .source-admin    { background: rgba(239,68,68,0.12);   color: #ef4444; }

        /* Add Entry Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            z-index: 2000; display: none;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white; border-radius: 20px;
            padding: 32px; width: 100%; max-width: 520px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .time-toggle { display: none; }
        .time-toggle.visible { display: block; }
        .share-section { display: none; }
        .share-section.visible { display: block; }
    </style>
</head>

<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <main class="main-content" id="main-content">
        <div th:replace="~{fragments/layout :: topbar('📅 Calendar')}"></div>
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div style="padding: 0 24px 24px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="display:flex; align-items:center; gap:16px;">
                    <a href="javascript:history.back()" class="btn btn-secondary" style="padding: 8px 12px; border-radius: 10px; text-decoration: none; display: flex; align-items: center; gap: 4px;">
                        <span>←</span> Back
                    </a>
                    <div>
                        <h2 style="margin:0; font-size:22px; font-weight:700;">Study Calendar</h2>
                        <p style="margin:4px 0 0; color:#6b7280; font-size:14px;">Manage your schedule and see school events</p>
                    </div>
                </div>
                <button id="open-add-modal" class="btn btn-primary">+ Add Entry</button>
            </div>

            <!-- Legend -->
            <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:20px; font-size:13px;">
                <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#6366f1;margin-right:5px;"></span>Personal</span>
                <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#10b981;margin-right:5px;"></span>Shared by Teacher</span>
                <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#ef4444;margin-right:5px;"></span>School Event</span>
            </div>

            <div class="calendar-wrapper">
                <div id="calendar"></div>
            </div>
        </div>
    </main>
</div>

<!-- Event Detail Panel -->
<div id="event-panel">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px;">
        <h3 id="panel-title" style="margin:0; font-size:18px; font-weight:700;"></h3>
        <button onclick="closePanel()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#9ca3af;">✕</button>
    </div>
    <span id="panel-badge" class="panel-source-badge"></span>
    <div id="panel-type" style="font-size:14px; color:#6b7280; margin-bottom:8px;"></div>
    <div id="panel-time" style="font-size:14px; color:#374151; margin-bottom:12px;"></div>
    <div id="panel-desc" style="font-size:14px; color:#4b5563; line-height:1.6; margin-bottom:16px;"></div>
    <div id="panel-shared-by" style="font-size:13px; color:#9ca3af; margin-bottom:16px;"></div>
    <button id="panel-delete" class="btn btn-danger btn-sm" onclick="deleteEntry()" style="display:none;">🗑 Delete</button>
</div>

<!-- Add Entry Modal -->
<div class="modal-overlay" id="add-modal">
    <div class="modal-box">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="margin:0;">Add Calendar Entry</h3>
            <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#9ca3af;">✕</button>
        </div>

        <div class="form-group">
            <label class="form-label">Title *</label>
            <input type="text" id="entry-title" class="form-control" placeholder="e.g. Study Session, Team Meeting" required>
        </div>

        <div class="form-group">
            <label class="form-label">Type</label>
            <select id="entry-type" class="form-control">
                <option value="">— No Type —</option>
                <option th:each="t : ${entryTypes}" th:value="${t.id}"
                        th:text="${t.icon + ' ' + t.name}"
                        th:attr="data-color=${t.color}">Type</option>
            </select>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div class="form-group">
                <label class="form-label">Start Date *</label>
                <input type="date" id="entry-start" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">End Date</label>
                <input type="date" id="entry-end" class="form-control">
            </div>
        </div>

        <div class="form-group">
            <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                <input type="checkbox" id="entry-allday" checked onchange="toggleTime(this)">
                <span class="form-label" style="margin:0;">All Day Event</span>
            </label>
        </div>

        <div class="time-toggle" id="time-field">
            <div class="form-group">
                <label class="form-label">Time</label>
                <input type="time" id="entry-time" class="form-control">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="entry-desc" class="form-control" rows="3" placeholder="Optional notes..."></textarea>
        </div>

        <!-- Teacher-only sharing section -->
        <div class="share-section" id="share-section" sec:authorize="hasRole('TEACHER')">
            <hr style="margin: 16px 0; border-color: rgba(0,0,0,0.08);">
            <div class="form-group">
                <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                    <input type="checkbox" id="entry-shared" onchange="toggleShare(this)">
                    <span class="form-label" style="margin:0;">📢 Share with Students</span>
                </label>
            </div>
            <div id="share-details" style="display:none;">
                <div class="form-group">
                    <label class="form-label">Grades (empty = all your grades)</label>
                    <select id="entry-grades" class="form-control" multiple>
                        <option th:each="g : ${teacherGrades}" th:value="${g.id}" th:text="${g.name}">Grade</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Subjects (empty = no subject filter)</label>
                    <select id="entry-subjects" class="form-control" multiple>
                        <option th:each="s : ${teacherSubjects}" th:value="${s.id}" th:text="${s.name}">Subject</option>
                    </select>
                </div>
            </div>
        </div>

        <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="btn btn-primary" onclick="saveEntry()" style="flex:1;">Save Entry</button>
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script th:inline="javascript">
    let currentEntryId = null;

    // ===== FullCalendar Init =====
    document.addEventListener('DOMContentLoaded', function () {
        const isTeacher = /*[[${currentUser?.role?.name() == 'TEACHER'}]]*/ false;
        if (isTeacher) {
            document.getElementById('share-section').classList.add('visible');
        }

        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            height: 'auto',
            events: function (fetchInfo, successCallback, failureCallback) {
                fetch(`/api/calendar/events?start=${fetchInfo.startStr.slice(0,10)}&end=${fetchInfo.endStr.slice(0,10)}`)
                    .then(r => r.json())
                    .then(successCallback)
                    .catch(failureCallback);
            },
            dateClick: function (info) {
                document.getElementById('entry-start').value = info.dateStr;
                openModal();
            },
            eventClick: function (info) {
                showPanel(info.event);
            },
            eventDidMount: function (info) {
                info.el.title = info.event.extendedProps.description || info.event.title;
            }
        });
        calendar.render();
        window._calendar = calendar;
    });

    // ===== Panel =====
    function showPanel(event) {
        const p = event.extendedProps;
        currentEntryId = p.entryId;

        document.getElementById('panel-title').textContent = event.title;
        document.getElementById('panel-type').textContent = p.typeIcon ? `${p.typeIcon} ${p.typeName || ''}` : '';

        const timeText = p.eventTime ? `🕐 ${p.eventTime}` : (event.allDay ? '📅 All Day' : '');
        document.getElementById('panel-time').textContent = timeText;
        document.getElementById('panel-desc').textContent = p.description || '';
        document.getElementById('panel-shared-by').textContent = p.sharedBy ? `Shared by ${p.sharedBy}` : '';

        const badge = document.getElementById('panel-badge');
        const sources = { PERSONAL: ['Personal', 'source-personal'], SHARED: ['Shared by Teacher', 'source-shared'], ADMIN: ['School Event 🔒', 'source-admin'] };
        const [label, cls] = sources[p.source] || ['Event', 'source-admin'];
        badge.textContent = label;
        badge.className = `panel-source-badge ${cls}`;

        const deleteBtn = document.getElementById('panel-delete');
        deleteBtn.style.display = p.readOnly ? 'none' : 'inline-block';

        document.getElementById('event-panel').classList.add('open');
    }

    function closePanel() {
        document.getElementById('event-panel').classList.remove('open');
        currentEntryId = null;
    }

    function deleteEntry() {
        if (!currentEntryId || !confirm('Delete this entry?')) return;
        fetch(`/api/calendar/events/${currentEntryId}/delete`, { method: 'POST', headers: { 'X-CSRF-TOKEN': getCsrf() } })
            .then(r => r.json()).then(data => {
                if (data.success) { closePanel(); window._calendar.refetchEvents(); }
                else alert('Error: ' + data.error);
            });
    }

    // ===== Modal =====
    function openModal() { document.getElementById('add-modal').classList.add('show'); }
    function closeModal() { document.getElementById('add-modal').classList.remove('show'); resetForm(); }

    function toggleTime(cb) {
        document.getElementById('time-field').classList.toggle('visible', !cb.checked);
    }
    function toggleShare(cb) {
        document.getElementById('share-details').style.display = cb.checked ? 'block' : 'none';
    }

    document.getElementById('open-add-modal').addEventListener('click', openModal);

    function saveEntry() {
        const title = document.getElementById('entry-title').value.trim();
        if (!title) { alert('Title is required'); return; }
        const startDate = document.getElementById('entry-start').value;
        if (!startDate) { alert('Start date is required'); return; }

        const allDay = document.getElementById('entry-allday').checked;
        const sharedCb = document.getElementById('entry-shared');
        const shared = sharedCb && sharedCb.checked;

        const gradeIds = shared ? [...document.getElementById('entry-grades').selectedOptions].map(o => o.value) : [];
        const subjectIds = shared ? [...document.getElementById('entry-subjects').selectedOptions].map(o => o.value) : [];

        const body = {
            title,
            description: document.getElementById('entry-desc').value,
            startDate,
            endDate: document.getElementById('entry-end').value || null,
            allDay,
            eventTime: allDay ? null : document.getElementById('entry-time').value,
            typeId: document.getElementById('entry-type').value || null,
            shared,
            gradeIds,
            subjectIds
        };

        fetch('/api/calendar/events', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': getCsrf() },
            body: JSON.stringify(body)
        }).then(r => r.json()).then(data => {
            if (data.success) { closeModal(); window._calendar.refetchEvents(); }
            else alert('Error: ' + data.error);
        });
    }

    function resetForm() {
        ['entry-title','entry-desc','entry-end','entry-time'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        document.getElementById('entry-allday').checked = true;
        document.getElementById('time-field').classList.remove('visible');
        const sd = document.getElementById('share-details');
        if (sd) sd.style.display = 'none';
        const sharedCb = document.getElementById('entry-shared');
        if (sharedCb) sharedCb.checked = false;
    }

    function getCsrf() {
        const meta = document.querySelector('meta[name="_csrf"]');
        return meta ? meta.getAttribute('content') : '';
    }

    // Close panel on outside click
    document.addEventListener('click', function(e) {
        const panel = document.getElementById('event-panel');
        if (panel.classList.contains('open') && !panel.contains(e.target) && !e.target.closest('.fc-event')) {
            closePanel();
        }
    });
</script>
</body>
</html>
