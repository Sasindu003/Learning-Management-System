<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Timetable — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('My Teaching Schedule')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="glass-card">
                <h3 class="mb-2">📅 Weekly Teaching Schedule</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Day</th>
                                <th>Time</th>
                                <th>Subject</th>
                                <th>Grade</th>
                                <th>Room</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tt : ${timetable}">
                                <td><span class="badge badge-info" th:text="${tt.dayOfWeek}">MON</span></td>
                                <td th:text="${tt.startTime} + ' - ' + ${tt.endTime}">08:00-09:00</td>
                                <td><span class="badge badge-primary" th:text="${tt.subject.name}">Subject</span></td>
                                <td th:text="${tt.grade.name}">Grade</td>
                                <td th:text="${tt.room ?: '-'}">Room</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(timetable)}" class="empty-state">
                    <div class="icon">📅</div>
                    <h4>No schedule set yet</h4>
                    <p>Your teaching schedule will appear here once the admin sets it up.</p>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
