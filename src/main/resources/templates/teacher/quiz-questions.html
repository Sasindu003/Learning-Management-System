<!DOCTYPE html>
<!-- teacher/quiz-questions.html — Add/manage questions for a specific quiz. -->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Quiz Questions')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>❓ Quiz Questions</h1>
                <p class="page-subtitle">
                    Managing questions for: <strong th:text="${quiz.title}">Chapter 5 Quiz</strong>
                </p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <a th:href="@{/teacher/quizzes}" class="btn btn-secondary" style="margin-bottom:1.5rem;">
                ← Back to Quizzes
            </a>

            <!-- Add Question Form -->
            <div class="card form-card">
                <h2 class="card-title">Add New Question</h2>
                <form th:action="@{/teacher/quizzes/{id}/questions(id=${quiz.id})}" method="post">
                    <div class="form-group">
                        <label for="questionText">Question</label>
                        <textarea id="questionText" name="questionText" rows="2"
                            placeholder="e.g., What is the capital of France?" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="optionA">Option A</label>
                            <input type="text" id="optionA" name="optionA" placeholder="Option A" required>
                        </div>
                        <div class="form-group">
                            <label for="optionB">Option B</label>
                            <input type="text" id="optionB" name="optionB" placeholder="Option B" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="optionC">Option C</label>
                            <input type="text" id="optionC" name="optionC" placeholder="Option C" required>
                        </div>
                        <div class="form-group">
                            <label for="optionD">Option D</label>
                            <input type="text" id="optionD" name="optionD" placeholder="Option D" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="correctOption">Correct Answer</label>
                        <select id="correctOption" name="correctOption" required>
                            <option value="">-- Select --</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Question</button>
                </form>
            </div>

            <!-- Questions List -->
            <div class="card">
                <h2 class="card-title">
                    Questions (<span th:text="${questions.size()}">0</span>)
                </h2>
                <div th:if="${#lists.isEmpty(questions)}" class="empty-state">
                    <p>No questions added yet. Add your first question above!</p>
                </div>
                <div th:each="question, iterStat : ${questions}" class="question-card">
                    <div class="question-header">
                        <strong>Q<span th:text="${iterStat.count}">1</span>.</strong>
                        <span th:text="${question.questionText}">What is 2 + 2?</span>
                        <form
                            th:action="@{/teacher/quizzes/{qid}/questions/delete/{id}(qid=${quiz.id}, id=${question.id})}"
                            method="post" class="inline-form">
                            <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this question?')">Delete</button>
                        </form>
                    </div>
                    <div class="question-options">
                        <span th:classappend="${question.correctOption == 'A'} ? 'correct-option' : ''">
                            A) <span th:text="${question.optionA}">3</span>
                        </span>
                        <span th:classappend="${question.correctOption == 'B'} ? 'correct-option' : ''">
                            B) <span th:text="${question.optionB}">4</span>
                        </span>
                        <span th:classappend="${question.correctOption == 'C'} ? 'correct-option' : ''">
                            C) <span th:text="${question.optionC}">5</span>
                        </span>
                        <span th:classappend="${question.correctOption == 'D'} ? 'correct-option' : ''">
                            D) <span th:text="${question.optionD}">6</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
