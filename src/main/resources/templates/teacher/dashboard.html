<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Teacher Dashboard')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📖</div>
                    <div class="stat-value" th:text="${courseCount}">0</div>
                    <div class="stat-label">My Courses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👨‍🎓</div>
                    <div class="stat-value" th:text="${currentUser.primaryId}">TE001</div>
                    <div class="stat-label">Teacher ID</div>
                </div>
            </div>

            <div class="glass-card mb-3">
                <div class="flex-between mb-2">
                    <h3>📖 My Courses</h3>
                    <a href="/teacher/courses" class="btn btn-primary btn-sm">+ New Course</a>
                </div>
                <div class="card-grid">
                    <div th:each="c : ${courses}" class="content-card">
                        <h4 th:text="${c.title}">Course</h4>
                        <p><span class="badge badge-primary" th:text="${c.subject.name}">Subject</span>
                            <span class="badge badge-info" th:text="${c.grade.name}">Grade</span>
                        </p>
                        <p th:text="${c.description}">Description</p>
                        <div class="card-footer">
                            <a th:href="@{/teacher/courses/{id}(id=${c.id})}" class="btn btn-info btn-sm">Manage →</a>
                            <a th:href="@{/teacher/attendance/{id}(id=${c.id})}"
                                class="btn btn-secondary btn-sm">Attendance</a>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(courses)}" class="empty-state">
                    <div class="icon">📖</div>
                    <h4>No courses yet</h4>
                    <p>Create your first course to get started</p>
                </div>
            </div>

            <div class="glass-card">
                <h3 class="mb-2">📢 Recent Announcements</h3>
                <div th:each="a : ${recentAnnouncements}" class="announcement-card">
                    <h5 th:text="${a.title}">Title</h5>
                    <p th:text="${#strings.abbreviate(a.content, 100)}">Content</p>
                    <div class="meta"><span th:text="${#temporals.format(a.createdAt, 'MMM dd, yyyy')}">Date</span>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(recentAnnouncements)}" class="empty-state">
                    <p>No announcements</p>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
