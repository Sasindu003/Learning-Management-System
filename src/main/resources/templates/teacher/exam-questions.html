<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Questions — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Manage Questions')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="glass-card mb-3">
                <div class="flex-between">
                    <div>
                        <h3 th:text="${exam.title}">Exam</h3>
                        <p class="text-muted"
                            th:text="'Type: ' + ${exam.type} + ' · Duration: ' + ${exam.durationMinutes} + ' min · Total: ' + ${exam.totalMarks} + ' marks'">
                            Info</p>
                    </div>
                    <div class="inline-flex">
                        <span class="badge badge-info" th:text="${#lists.size(questions)} + ' Questions'">0</span>
                        <span class="badge" th:classappend="${exam.published} ? 'badge-success' : 'badge-warning'"
                            th:text="${exam.published} ? 'Published' : 'Draft'">Status</span>
                    </div>
                </div>
            </div>

            <div class="data-grid">
                <!-- Add Question Form -->
                <div class="glass-card">
                    <h3 class="mb-2">➕ Add Question</h3>
                    <form th:action="@{/teacher/exams/{id}/questions/add(id=${exam.id})}" method="post" data-validate>
                        <div class="form-group"><label class="form-label">Question *</label>
                            <textarea name="questionText" class="form-control" rows="3" required
                                placeholder="Enter question text"></textarea>
                        </div>
                        <div class="data-grid">
                            <div class="form-group"><label class="form-label">Option A *</label>
                                <input type="text" name="optionA" class="form-control" required placeholder="Option A">
                            </div>
                            <div class="form-group"><label class="form-label">Option B *</label>
                                <input type="text" name="optionB" class="form-control" required placeholder="Option B">
                            </div>
                        </div>
                        <div class="data-grid">
                            <div class="form-group"><label class="form-label">Option C *</label>
                                <input type="text" name="optionC" class="form-control" required placeholder="Option C">
                            </div>
                            <div class="form-group"><label class="form-label">Option D *</label>
                                <input type="text" name="optionD" class="form-control" required placeholder="Option D">
                            </div>
                        </div>
                        <div class="data-grid">
                            <div class="form-group"><label class="form-label">Correct Answer *</label>
                                <select name="correctAnswer" class="form-control" required>
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>
                            <div class="form-group"><label class="form-label">Marks</label>
                                <input type="number" name="marks" class="form-control" value="1" min="1">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Question</button>
                    </form>
                </div>

                <!-- Questions List -->
                <div class="glass-card">
                    <h3 class="mb-2">📋 Questions</h3>
                    <div th:each="q,iter : ${questions}" class="question-card mb-2"
                        style="position:relative; transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.5rem;">
                        <div class="flex-between">
                            <h4>
                                <span class="badge badge-primary" th:text="'Q' + ${iter.count}">Q1</span>
                                <span th:text="${q.questionText}" style="margin-left:8px; font-weight: 500;">Question</span>
                            </h4>
                            <div class="inline-flex">
                                <a th:href="@{/teacher/exams/questions/edit/{id}(id=${q.id})}" class="btn btn-sm btn-info"
                                    title="Edit Question">
                                    ✏️ Edit
                                </a>
                                <a th:href="@{/teacher/exams/questions/delete/{id}(id=${q.id})}" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Are you sure you want to delete this question?')"
                                    title="Delete Question">
                                    🗑️ Delete
                                </a>
                            </div>
                        </div>
                        <div style="margin-left:32px;margin-top:1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                            <div th:classappend="${q.correctAnswer == 'A'} ? 'text-success' : 'text-muted'"
                                style="font-size:13px; padding: 0.5rem; border-radius: 8px; background: rgba(255,255,255,0.05);">
                                <strong th:style="${q.correctAnswer == 'A'} ? 'color: inherit' : ''">A)</strong> <span th:text="${q.optionA}">Option</span>
                                <span th:if="${q.correctAnswer == 'A'}" class="float-right">✅</span>
                            </div>
                            <div th:classappend="${q.correctAnswer == 'B'} ? 'text-success' : 'text-muted'"
                                style="font-size:13px; padding: 0.5rem; border-radius: 8px; background: rgba(255,255,255,0.05);">
                                <strong th:style="${q.correctAnswer == 'B'} ? 'color: inherit' : ''">B)</strong> <span th:text="${q.optionB}">Option</span>
                                <span th:if="${q.correctAnswer == 'B'}" class="float-right">✅</span>
                            </div>
                            <div th:classappend="${q.correctAnswer == 'C'} ? 'text-success' : 'text-muted'"
                                style="font-size:13px; padding: 0.5rem; border-radius: 8px; background: rgba(255,255,255,0.05);">
                                <strong th:style="${q.correctAnswer == 'C'} ? 'color: inherit' : ''">C)</strong> <span th:text="${q.optionC}">Option</span>
                                <span th:if="${q.correctAnswer == 'C'}" class="float-right">✅</span>
                            </div>
                            <div th:classappend="${q.correctAnswer == 'D'} ? 'text-success' : 'text-muted'"
                                style="font-size:13px; padding: 0.5rem; border-radius: 8px; background: rgba(255,255,255,0.05);">
                                <strong th:style="${q.correctAnswer == 'D'} ? 'color: inherit' : ''">D)</strong> <span th:text="${q.optionD}">Option</span>
                                <span th:if="${q.correctAnswer == 'D'}" class="float-right">✅</span>
                            </div>
                        </div>
                        <div class="mt-2 text-muted" style="margin-left:32px; font-size: 12px;">
                            <span>🎯 Correct: <strong th:text="${q.correctAnswer}">A</strong></span>
                            <span style="margin-left: 1rem;">💎 Marks: <strong th:text="${q.marks}">1</strong></span>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(questions)}" class="empty-state">
                        <p>No questions added yet</p>
                    </div>

                    <div class="mt-2" th:unless="${exam.published}">
                        <a th:href="@{/teacher/exams/{id}/publish(id=${exam.id})}" class="btn btn-success"
                            th:if="${!#lists.isEmpty(questions)}">✅ Publish Exam</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
