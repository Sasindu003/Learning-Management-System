<!DOCTYPE html>
<!--
  teacher/assignments.html — Updated with Edit + View Submissions buttons for Sprint 1.
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Assignments')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>📝 Assignments</h1>
                <p class="page-subtitle">Create and manage assignments for students</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Create Form -->
            <div class="card form-card">
                <h2 class="card-title">Create New Assignment</h2>
                <form th:action="@{/teacher/assignments}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" name="title" placeholder="e.g., Homework: Chapter 5 Problems"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="subjectId">Subject</label>
                            <select id="subjectId" name="subjectId" required>
                                <option value="">-- Select Subject --</option>
                                <option th:each="subject : ${subjects}" th:value="${subject.id}"
                                    th:text="${subject.name + ' (' + subject.grade.name + ')'}">Math</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="4" placeholder="Detailed instructions..."
                            required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" name="dueDate" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Assignment</button>
                </form>
            </div>

            <!-- Assignments Table -->
            <div class="card">
                <h2 class="card-title">Existing Assignments</h2>
                <div th:if="${#lists.isEmpty(assignments)}" class="empty-state">
                    <p>No assignments created yet.</p>
                </div>
                <table th:unless="${#lists.isEmpty(assignments)}" class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Subject</th>
                            <th>Due Date</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="assignment, iterStat : ${assignments}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${assignment.title}">Homework</td>
                            <td th:text="${assignment.subject.name}">Math</td>
                            <td th:text="${assignment.dueDate}">2026-02-28</td>
                            <td th:text="${#temporals.format(assignment.createdAt, 'MMM dd, yyyy')}">Feb 20</td>
                            <td class="action-buttons">
                                <a th:href="@{/teacher/assignments/{id}/submissions(id=${assignment.id})}"
                                    class="btn btn-primary btn-sm">Submissions</a>
                                <a th:href="@{/teacher/assignments/edit/{id}(id=${assignment.id})}"
                                    class="btn btn-secondary btn-sm">Edit</a>
                                <form th:action="@{/teacher/assignments/delete/{id}(id=${assignment.id})}" method="post"
                                    class="inline-form">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Delete this assignment?')">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>

</html>
