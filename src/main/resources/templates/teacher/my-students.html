<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Students — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('My Students')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div th:each="entry : ${studentsByGrade}" class="glass-card mb-3">
                <h3 class="mb-2"><span class="badge badge-primary" th:text="${entry.key.name}">Grade</span> Students
                </h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Assignments Done</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${entry.value}">
                                <td><span class="badge badge-info" th:text="${s.primaryId}">ST001</span></td>
                                <td><strong th:text="${s.fullName}">Name</strong></td>
                                <td th:text="${s.email ?: '-'}">email</td>
                                <td th:text="${s.phone ?: '-'}">phone</td>
                                <td>
                                    <button class="badge" 
                                            th:classappend="${progressStats[s.id].completedCount == progressStats[s.id].totalCount && progressStats[s.id].totalCount > 0 ? 'badge-success' : 'badge-primary'}"
                                            th:data-id="${s.id}"
                                            th:data-name="${s.fullName}"
                                            onclick="viewProgress(this.getAttribute('data-id'), this.getAttribute('data-name'))"
                                            th:text="${progressStats[s.id].getDisplayProgress()}"
                                            style="cursor: pointer; border: none;">
                                        0 / 0
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div th:if="${#maps.isEmpty(studentsByGrade)}" class="glass-card">
                <div class="empty-state">
                    <div class="icon">👥</div>
                    <h4>No students found</h4>
                    <p>Create courses for grades that have students</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Progress Modal -->
    <div id="progress-modal" class="modal-overlay">
        <div class="modal" style="max-width: 800px; width: 95%;">
            <div class="flex-between mb-2">
                <h3 id="modal-student-name">Student Progress</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeModal('progress-modal')">✕</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Assignment</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Marks</th>
                        </tr>
                    </thead>
                    <tbody id="progress-list">
                        <!-- Loaded via AJAX -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script>
        function viewProgress(studentId, studentName) {
            const modalTitle = document.getElementById('modal-student-name');
            const list = document.getElementById('progress-list');
            
            modalTitle.textContent = studentName + "'s Assignments";
            list.innerHTML = '<tr><td colspan="4" class="text-center">Loading...</td></tr>';
            
            openModal('progress-modal');
            
            fetch('/teacher/api/students/' + studentId + '/progress')
                .then(res => {
                    if (!res.ok) throw new Error('Failed to fetch progress');
                    return res.json();
                })
                .then(data => {
                    list.innerHTML = '';
                    if (data.length === 0) {
                        list.innerHTML = '<tr><td colspan="4" class="text-center">No assignments found from you for this student.</td></tr>';
                        return;
                    }
                    data.forEach(item => {
                        const tr = document.createElement('tr');
                        
                        let statusBadge = '';
                        if (item.submitted) {
                            statusBadge = `<span class="badge badge-success">Submitted</span>`;
                        } else if (new Date(item.dueDate) < new Date()) {
                            statusBadge = `<span class="badge badge-danger">Overdue</span>`;
                        } else {
                            statusBadge = `<span class="badge badge-warning">Pending</span>`;
                        }
                        
                        // Fix formatting of date
                        const d = new Date(item.dueDate);
                        const dueDateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        const marks = item.graded ? `<span class="badge badge-info">${item.marks}</span>` : (item.submitted ? '<small class="text-muted">Pending Grade</small>' : '-');
                        
                        tr.innerHTML = `
                            <td><strong>${item.title}</strong></td>
                            <td style="font-size: 12px;">${dueDateStr}</td>
                            <td>${statusBadge}</td>
                            <td>${marks}</td>
                        `;
                        list.appendChild(tr);
                    });
                })
                .catch(err => {
                    console.error(err);
                    list.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error: ' + err.message + '</td></tr>';
                });
        }
    </script>
</body>

</html>
