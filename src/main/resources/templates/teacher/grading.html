<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Grading')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="glass-card mb-3">
                <h3 th:text="${course.title}">Course</h3>
                <p class="text-muted"><span class="badge badge-primary" th:text="${course.subject.name}">Subject</span>
                </p>
            </div>
            <div class="data-grid">
                <div class="glass-card">
                    <h3 class="mb-2">📝 Enter Grade</h3>
                    <form th:action="@{/teacher/grading/save}" method="post" data-validate>
                        <input type="hidden" name="courseId" th:value="${course.id}">
                        <div class="form-group"><label class="form-label">Student *</label>
                            <select name="studentId" class="form-control" required>
                                <option value="">Select Student</option>
                                <option th:each="s : ${students}" th:value="${s.id}"
                                    th:text="${s.primaryId + ' - ' + s.fullName}">Student</option>
                            </select>
                        </div>
                        <div class="form-group"><label class="form-label">Exam/Assessment Name *</label>
                            <input type="text" name="examName" class="form-control" required
                                placeholder="e.g. Mid-term Test 1">
                        </div>
                        <div class="data-grid">
                            <div class="form-group"><label class="form-label">Marks *</label>
                                <input type="number" name="marks" class="form-control" required min="0" step="0.5">
                            </div>
                            <div class="form-group"><label class="form-label">Max Marks *</label>
                                <input type="number" name="maxMarks" class="form-control" required min="1" value="100">
                            </div>
                        </div>
                        <div class="form-group"><label class="form-label">Term</label>
                            <select name="term" class="form-control">
                                <option value="Term 1">Term 1</option>
                                <option value="Term 2">Term 2</option>
                                <option value="Term 3">Term 3</option>
                                <option value="Final">Final</option>
                            </select>
                        </div>
                        <div class="form-group"><label class="form-label">Remarks</label>
                            <textarea name="remarks" class="form-control" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Grade</button>
                    </form>
                </div>
                <div class="glass-card">
                    <h3 class="mb-2">📊 Recorded Grades</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Student</th>
                                    <th>Exam</th>
                                    <th>Marks</th>
                                    <th>Grade</th>
                                    <th>Term</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="g : ${grades}">
                                    <td><strong th:text="${g.student.fullName}">Name</strong></td>
                                    <td th:text="${g.examName}">Exam</td>
                                    <td th:text="${g.marks} + '/' + ${g.maxMarks}">Marks</td>
                                    <td><span class="badge"
                                            th:classappend="${g.percentage >= 50} ? 'badge-success' : 'badge-danger'"
                                            th:text="${g.letterGrade}">A</span></td>
                                    <td th:text="${g.term}">Term</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${#lists.isEmpty(grades)}" class="empty-state">
                        <p>No grades recorded</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
