<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Exam Results')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="glass-card mb-3">
                <h3 th:text="${exam.title}">Exam</h3>
                <p class="text-muted"
                    th:text="'Total Marks: ' + ${exam.totalMarks} + ' · Duration: ' + ${exam.durationMinutes} + ' min'">
                    Info</p>
            </div>
            <div class="glass-card">
                <h3 class="mb-2">📊 Student Results</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>ID</th>
                                <th>Score</th>
                                <th>Percentage</th>
                                <th>Status</th>
                                <th>Completed</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="a : ${attempts}">
                                <td><strong th:text="${a.student.fullName}">Name</strong></td>
                                <td><span class="badge badge-info" th:text="${a.student.primaryId}">ST001</span></td>
                                <td th:text="${a.score} + '/' + ${a.totalMarks}">0/100</td>
                                <td>
                                    <div class="progress-bar"
                                        style="width:100px;display:inline-block;vertical-align:middle">
                                        <div class="progress-fill" th:style="'width:' + ${a.percentage} + '%'"></div>
                                    </div> <span th:text="${#numbers.formatDecimal(a.percentage, 1, 1)} + '%'">0%</span>
                                </td>
                                <td><span class="badge"
                                        th:classappend="${a.percentage >= 50} ? 'badge-success' : 'badge-danger'"
                                        th:text="${a.percentage >= 50} ? 'Pass' : 'Fail'">Status</span></td>
                                <td
                                    th:text="${a.endTime != null} ? ${#temporals.format(a.endTime, 'MMM dd HH:mm')} : 'In Progress'">
                                    Date</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(attempts)}" class="empty-state">
                    <p>No attempts yet</p>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
