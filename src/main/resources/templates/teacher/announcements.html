<!DOCTYPE html>
<!-- teacher/announcements.html — Post class-specific announcements. -->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Class Announcements')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>📣 Class Announcements</h1>
                <p class="page-subtitle">Post announcements to specific classes/subjects</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Post Form -->
            <div class="card form-card">
                <h2 class="card-title">Post New Announcement</h2>
                <form th:action="@{/teacher/announcements}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" name="title" placeholder="e.g., Homework Due Reminder"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="subjectId">Class/Subject</label>
                            <select id="subjectId" name="subjectId" required>
                                <option value="">-- Select Subject --</option>
                                <option th:each="subject : ${subjects}" th:value="${subject.id}"
                                    th:text="${subject.name + ' (' + subject.grade.name + ')'}">Math</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="content">Message</label>
                        <textarea id="content" name="content" rows="3" placeholder="Write your announcement..."
                            required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Post Announcement</button>
                </form>
            </div>

            <!-- Announcements List -->
            <div class="card">
                <h2 class="card-title">Previous Announcements</h2>
                <div th:if="${#lists.isEmpty(announcements)}" class="empty-state">
                    <p>No class announcements posted yet.</p>
                </div>
                <div th:each="ann : ${announcements}" class="announcement-card">
                    <div class="announcement-header">
                        <h3 th:text="${ann.title}">Title</h3>
                        <form th:action="@{/teacher/announcements/delete/{id}(id=${ann.id})}" method="post"
                            class="inline-form">
                            <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this announcement?')">Delete</button>
                        </form>
                    </div>
                    <p th:text="${ann.content}">Content</p>
                    <div class="announcement-meta">
                        <span class="content-subject" th:text="${ann.subject.name}">Math</span>
                        <span th:text="${#temporals.format(ann.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
