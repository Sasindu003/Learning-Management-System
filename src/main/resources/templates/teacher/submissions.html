<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Assignment Submissions')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="glass-card mb-3">
                <h3 th:text="${assignment.title}">Assignment</h3>
                <p class="text-muted"
                    th:text="'Due: ' + ${#temporals.format(assignment.dueDate, 'MMM dd, yyyy')} + ' · Max: ' + ${assignment.maxMarks} + ' marks'">
                    Info</p>
            </div>
            <div class="glass-card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Submitted</th>
                                <th>File</th>
                                <th>Comments</th>
                                <th>Marks</th>
                                <th>Feedback</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${submissions}">
                                <td><strong th:text="${s.student.fullName}">Name</strong><br><small class="text-muted"
                                        th:text="${s.student.primaryId}">ID</small></td>
                                <td th:text="${#temporals.format(s.submittedAt, 'MMM dd HH:mm')}">Date</td>
                                <td th:text="${s.fileName ?: 'No file'}">File</td>
                                <td th:text="${s.comments ?: '-'}">Comments</td>
                                <td th:if="${s.graded}"><span class="badge badge-success"
                                        th:text="${s.marks} + '/' + ${assignment.maxMarks}">Marks</span></td>
                                <td th:unless="${s.graded}"><span class="badge badge-warning">Pending</span></td>
                                <td th:text="${s.feedback ?: '-'}">Feedback</td>
                                <td th:unless="${s.graded}">
                                    <form th:action="@{/teacher/submissions/{id}/grade(id=${s.id})}" method="post"
                                        style="display:flex;gap:6px;align-items:center">
                                        <input type="number" name="marks" class="form-control" style="width:70px"
                                            required min="0" th:max="${assignment.maxMarks}" placeholder="0">
                                        <input type="text" name="feedback" class="form-control" style="width:120px"
                                            placeholder="Feedback">
                                        <button type="submit" class="btn btn-success btn-sm">Grade</button>
                                    </form>
                                </td>
                                <td th:if="${s.graded}"><span class="badge badge-info">Graded</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(submissions)}" class="empty-state">
                    <p>No submissions yet</p>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
