<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('My Courses')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="glass-card mb-3">
                <h3 class="mb-2">Create New Course</h3>
                <form th:action="@{/teacher/courses/save}" method="post" data-validate>
                    <div class="data-grid" style="grid-template-columns:2fr 1fr 1fr">
                        <div class="form-group"><label class="form-label">Title *</label>
                            <input type="text" name="title" class="form-control" required
                                placeholder="e.g. Advanced Mathematics">
                        </div>
                        <div class="form-group"><label class="form-label">Subject *</label>
                            <select name="subjectId" class="form-control" required>
                                <option value="">Select</option>
                                <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.name}">Sub</option>
                            </select>
                        </div>
                        <div class="form-group"><label class="form-label">Grade *</label>
                            <select name="gradeId" class="form-control" required>
                                <option value="">Select</option>
                                <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}">Grade</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group"><label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="2"
                            placeholder="Course description"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Course</button>
                </form>
            </div>

            <div class="card-grid">
                <div th:each="c : ${courses}" class="content-card">
                    <h4 th:text="${c.title}">Course</h4>
                    <p><span class="badge badge-primary" th:text="${c.subject.name}">Subject</span>
                        <span class="badge badge-info" th:text="${c.grade.name}">Grade</span>
                    </p>
                    <p th:text="${c.description}">Desc</p>
                    <div class="card-footer" style="display: flex; gap: 10px; align-items: center; justify-content: space-between;">
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <a th:href="@{/teacher/courses/{id}(id=${c.id})}" class="btn btn-info btn-sm">Manage →</a>
                            <a th:href="@{/courses/{id}/toggle-pin(id=${c.id})}" 
                               style="text-decoration: none; font-size: 20px; line-height: 1;"
                               th:title="${currentUser.pinnedCourses.contains(c)} ? 'Unpin from Dashboard' : 'Pin to Dashboard'">
                                <span th:text="${currentUser.pinnedCourses.contains(c)} ? '⭐' : '☆'"></span>
                            </a>
                        </div>
                        <span class="text-muted" style="font-size:12px"
                            th:text="'Created ' + ${#temporals.format(c.createdAt, 'MMM dd')}">Date</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
