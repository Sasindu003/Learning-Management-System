<!DOCTYPE html>
<!--
  teacher/lesson-notes.html — Updated with Edit buttons for Sprint 1.
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Lesson Notes')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>📄 Lesson Notes</h1>
                <p class="page-subtitle">Upload and manage lesson materials for students</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Upload Form -->
            <div class="card form-card">
                <h2 class="card-title">Upload New Lesson Note</h2>
                <form th:action="@{/teacher/lessons}" method="post" enctype="multipart/form-data">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" name="title" placeholder="e.g., Chapter 5 — Trigonometry"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="subjectId">Subject</label>
                            <select id="subjectId" name="subjectId" required>
                                <option value="">-- Select Subject --</option>
                                <option th:each="subject : ${subjects}" th:value="${subject.id}"
                                    th:text="${subject.name + ' (' + subject.grade.name + ')'}">Math</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="file">File (PDF, DOC, PPT, etc.)</label>
                        <input type="file" id="file" name="file" required class="file-input">
                    </div>
                    <button type="submit" class="btn btn-primary">Upload</button>
                </form>
            </div>

            <!-- Lesson Notes Table -->
            <div class="card">
                <h2 class="card-title">Uploaded Lesson Notes</h2>
                <div th:if="${#lists.isEmpty(lessons)}" class="empty-state">
                    <p>No lesson notes uploaded yet. Upload your first one!</p>
                </div>
                <table th:unless="${#lists.isEmpty(lessons)}" class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Subject</th>
                            <th>File</th>
                            <th>Uploaded</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="lesson, iterStat : ${lessons}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${lesson.title}">Chapter 5</td>
                            <td th:text="${lesson.subject.name}">Math</td>
                            <td th:text="${lesson.fileName}">notes.pdf</td>
                            <td th:text="${#temporals.format(lesson.uploadedAt, 'MMM dd, yyyy')}">Feb 20</td>
                            <td class="action-buttons">
                                <a th:href="@{/teacher/lessons/edit/{id}(id=${lesson.id})}"
                                    class="btn btn-secondary btn-sm">Edit</a>
                                <form th:action="@{/teacher/lessons/delete/{id}(id=${lesson.id})}" method="post"
                                    class="inline-form">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Delete this lesson note?')">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>

</html>
