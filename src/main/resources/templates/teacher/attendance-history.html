<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance History — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Attendance History')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="glass-card mb-3">
                <h3 th:text="${course.title}">Course</h3>
                <p class="text-muted">
                    <span class="badge badge-primary" th:text="${course.subject.name}">Subject</span>
                    <span class="badge badge-info" th:text="${course.grade.name}">Grade</span>
                </p>

                <form th:action="@{/teacher/attendance/{id}/history(id=${course.id})}" method="get"
                    class="inline-flex mt-2" style="gap:10px;align-items:end">
                    <div class="form-group" style="margin-bottom:0">
                        <label class="form-label">Select Date</label>
                        <input type="date" name="date" class="form-control" th:value="${viewDate}">
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">View</button>
                    <a th:href="@{/teacher/attendance/{id}(id=${course.id})}" class="btn btn-info btn-sm">Mark Today</a>
                </form>
            </div>

            <div class="glass-card">
                <h3 class="mb-2">📋 Attendance for <span
                        th:text="${#temporals.format(viewDate, 'EEEE, MMM dd yyyy')}">Date</span></h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>ID</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${students}">
                                <td><strong th:text="${s.fullName}">Name</strong></td>
                                <td><span class="badge badge-info" th:text="${s.primaryId}">ST001</span></td>
                                <td>
                                    <th:block th:each="att : ${attendanceRecords}"
                                        th:if="${att.student.id == s.id}">
                                        <span class="badge"
                                            th:classappend="${att.status.name() == 'PRESENT'} ? 'badge-success' : (${att.status.name() == 'ABSENT'} ? 'badge-danger' : (${att.status.name() == 'LATE'} ? 'badge-warning' : 'badge-info'))"
                                            th:text="${att.status}">Status</span>
                                    </th:block>
                                    <span th:if="${#lists.isEmpty(attendanceRecords)}" class="text-muted">Not marked</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(students)}" class="empty-state">
                    <p>No students in this grade</p>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
