<!DOCTYPE html>
<!-- teacher/edit-lesson.html — Edit an existing lesson note. Pre-fills with current data. -->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Edit Lesson Note')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>✏️ Edit Lesson Note</h1>
                <p class="page-subtitle">Update the title, subject, or replace the file</p>
            </div>

            <div class="card form-card">
                <form th:action="@{/teacher/lessons/edit/{id}(id=${lesson.id})}" method="post"
                    enctype="multipart/form-data">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" name="title" th:value="${lesson.title}" required>
                        </div>
                        <div class="form-group">
                            <label for="subjectId">Subject</label>
                            <select id="subjectId" name="subjectId" required>
                                <option th:each="subject : ${subjects}" th:value="${subject.id}"
                                    th:text="${subject.name + ' (' + subject.grade.name + ')'}"
                                    th:selected="${subject.id == lesson.subject.id}">Math</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Current File</label>
                        <p class="current-file">📁 <span th:text="${lesson.fileName}">notes.pdf</span></p>
                    </div>
                    <div class="form-group">
                        <label for="file">Replace File (optional — leave empty to keep current)</label>
                        <input type="file" id="file" name="file" class="file-input">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a th:href="@{/teacher/lessons}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
