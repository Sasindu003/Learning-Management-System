<!DOCTYPE html>
<!-- teacher/edit-assignment.html — Edit an existing assignment. Pre-fills with current data. -->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Edit Assignment')}"></head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>✏️ Edit Assignment</h1>
                <p class="page-subtitle">Update the assignment details</p>
            </div>

            <div class="card form-card">
                <form th:action="@{/teacher/assignments/edit/{id}(id=${assignment.id})}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" name="title" th:value="${assignment.title}" required>
                        </div>
                        <div class="form-group">
                            <label for="subjectId">Subject</label>
                            <select id="subjectId" name="subjectId" required>
                                <option th:each="subject : ${subjects}" th:value="${subject.id}"
                                    th:text="${subject.name + ' (' + subject.grade.name + ')'}"
                                    th:selected="${subject.id == assignment.subject.id}">Math</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="4" required
                            th:text="${assignment.description}"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" name="dueDate" th:value="${assignment.dueDate}" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a th:href="@{/teacher/assignments}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
