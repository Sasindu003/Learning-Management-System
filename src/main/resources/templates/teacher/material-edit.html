<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Material — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Edit Material')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="glass-card" style="max-width: 600px">
                <h3 class="mb-3">✏️ Edit Material</h3>
                
                <div class="mb-3">
                    <p class="text-muted">Course: <strong th:text="${course.title}">Course Title</strong></p>
                    <p class="text-muted">File: <strong th:text="${material.fileName}">file.pdf</strong></p>
                </div>

                <form th:action="@{/teacher/materials/{id}/update(id=${material.id})}" method="post">
                    <div class="form-group">
                        <label class="form-label">Title *</label>
                        <input type="text" name="title" class="form-control" 
                               th:value="${material.title}" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="4" 
                                  th:text="${material.description}"></textarea>
                    </div>
                    
                    <div class="inline-flex">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a th:href="@{/teacher/courses/{id}(id=${course.id})}" 
                           class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
