<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Material — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Edit Course Material')}"></div>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="glass-card" style="max-width:640px">
                <p class="mb-2"><span class="badge badge-primary" th:text="${material.course.title}">Course</span></p>
                <form th:action="@{/teacher/materials/update}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="id" th:value="${material.id}">
                    
                    <div class="form-group"><label class="form-label">Title *</label>
                        <input type="text" name="title" th:value="${material.title}" class="form-control" required>
                    </div>
                    <div class="form-group"><label class="form-label">Description</label>
                        <textarea name="description" th:text="${material.description}" class="form-control" rows="3"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Content Choice</label>
                        <div class="flex-column" style="gap:15px">
                            <div>
                                <label class="checkbox-container" style="font-size:14px">
                                    <input type="radio" name="contentType" value="file" 
                                           th:checked="${material.filePath != null or (material.filePath == null and material.externalUrl == null)}"
                                           onclick="toggleMaterialInput('file')"> File Upload
                                </label>
                            </div>
                            <div>
                                <label class="checkbox-container" style="font-size:14px">
                                    <input type="radio" name="contentType" value="url" 
                                           th:checked="${material.externalUrl != null}"
                                           onclick="toggleMaterialInput('url')"> External Web Link
                                </label>
                            </div>
                        </div>
                    </div>

                    <div id="file-input-group" class="form-group" 
                         th:style="${material.externalUrl != null} ? 'display:none' : 'display:block'">
                        <label class="form-label">Upload File <span th:if="${material.filePath != null}">(leave empty to keep current)</span></label>
                        <input type="file" name="file" class="form-control">
                        <p class="text-muted" th:if="${material.fileName != null}" style="font-size:12px">Current: [[${material.fileName}]]</p>
                    </div>

                    <div id="url-input-group" class="form-group" 
                         th:style="${material.externalUrl == null} ? 'display:none' : 'display:block'">
                        <label class="form-label">External URL *</label>
                        <input type="url" name="externalUrl" th:value="${material.externalUrl}" 
                               class="form-control" placeholder="https://example.com/document">
                    </div>

                    <div class="inline-flex">
                        <button type="submit" class="btn btn-primary">Update Material</button>
                        <a th:href="@{/teacher/courses/{id}(id=${material.course.id})}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
    <script>
        function toggleMaterialInput(type) {
            const fileGroup = document.getElementById('file-input-group');
            const urlGroup = document.getElementById('url-input-group');
            if (type === 'file') {
                fileGroup.style.display = 'block';
                urlGroup.style.display = 'none';
                urlGroup.querySelector('input').required = false;
            } else {
                fileGroup.style.display = 'none';
                urlGroup.style.display = 'block';
                urlGroup.querySelector('input').required = true;
            }
        }
    </script>
</body>

</html>
