<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changelog — EduFlow LMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .changelog-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--glass-border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header-section h2 { margin: 0; font-size: 28px; }
        
        /* Markdown styles */
        .changelog-content {
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 15px;
        }
        .changelog-content h1, .changelog-content h2, .changelog-content h3 {
            margin-top: 1.8em;
            margin-bottom: 0.8em;
            font-weight: 600;
        }
        .changelog-content h1 { font-size: 2em; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .changelog-content h2 { font-size: 1.5em; color: var(--primary); }
        .changelog-content h3 { font-size: 1.25em; color: var(--info); }
        .changelog-content p { margin-bottom: 1em; color: var(--text-secondary); }
        .changelog-content ul, .changelog-content ol { padding-left: 20px; margin-bottom: 1.5em; color: var(--text-secondary); }
        .changelog-content li { margin-bottom: 8px; }
        .changelog-content strong { color: var(--text-primary); }
        
        .changelog-content pre { 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: var(--radius-sm); 
            overflow-x: auto; 
            margin: 1.5em 0; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .changelog-content code { 
            background: rgba(0,0,0,0.3); 
            padding: 3px 6px; 
            border-radius: 4px; 
            font-family: inherit; 
            font-size: 0.9em;
            color: #ff9d00;
        }
        .changelog-content pre code {
            background: none;
            padding: 0;
            color: var(--text-secondary);
        }
        
        .changelog-content table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 1.5em 0; 
            background: rgba(0,0,0,0.1);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .changelog-content th, .changelog-content td { 
            padding: 12px 15px; 
            border: 1px solid var(--glass-border); 
            text-align: left; 
        }
        .changelog-content th { background: rgba(255,255,255,0.05); font-weight: 600; }
        .changelog-content a { color: var(--primary); text-decoration: none; }
        .changelog-content a:hover { text-decoration: underline; }
        .changelog-content hr { border: 0; border-top: 1px solid var(--glass-border); margin: 2em 0; }
        .changelog-content blockquote {
            margin: 1.5em 0;
            padding: 10px 20px;
            border-left: 4px solid var(--primary);
            background: rgba(255,255,255,0.02);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-style: italic;
        }
    </style>
</head>
<body class="bg-grad">
    <div style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
        <a href="javascript:history.back()" class="btn btn-secondary" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(5px);">← Back</a>
    </div>

    <div class="changelog-container">
        <div class="header-section">
            <h2>📝 EduFlow Release Notes</h2>
            <span class="badge badge-primary" style="font-size: 16px; padding: 10px 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">v1.1.0</span>
        </div>
        
        <div id="content" class="changelog-content"></div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const rawMarkdown = /*[[${changelogContent}]]*/ '';
        document.getElementById('content').innerHTML = marked.parse(rawMarkdown);
        /*]]>*/
    </script>
</body>
</html>
