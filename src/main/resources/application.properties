# ===================================================================
# 🎓 EduFlow LMS Configuration
# ===================================================================

# Server Configuration
server.port=${PORT:8080}
spring.application.name=EduFlow LMS

# -------------------------------------------------------------------
# 🗄️ Supabase Database Configuration
# -------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/lmsdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# -------------------------------------------------------------------
# 🚀 JPA & Hibernate
# -------------------------------------------------------------------
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------------------
# 📂 File Upload Configuration
# -------------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -------------------------------------------------------------------
# ☁️ Cloudflare R2 Configuration
# -------------------------------------------------------------------
r2.bucket.name=${R2_BUCKET_NAME:lms}
r2.endpoint=${R2_ENDPOINT:http://localhost}
r2.access.key=${R2_ACCESS_KEY:}
r2.secret.key=${R2_SECRET_KEY:}

# -------------------------------------------------------------------
# 🎨 Thymeleaf Configuration
# -------------------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Enable automatic resource versioning (cache busting)
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# -------------------------------------------------------------------
# 🛡️ Security Configuration
# -------------------------------------------------------------------
# Enable H2 console access through Spring Security if needed (handled in SecurityConfig)
spring.main.allow-bean-definition-overriding=true
