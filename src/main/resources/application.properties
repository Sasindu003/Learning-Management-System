# ===================================================================
# 🎓 EduFlow LMS Configuration
# ===================================================================

# Server Configuration
server.port=8080
spring.application.name=EduFlow LMS

# -------------------------------------------------------------------
# 🗄️ Database Configuration (H2 Persistent)
# -------------------------------------------------------------------
# Connect to the persistent database file in the data folder
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# -------------------------------------------------------------------
# 🚀 JPA & Hibernate
# -------------------------------------------------------------------
# update: keeps data and updates schema when models change
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------------------
# 🛠️ H2 Web Console
# -------------------------------------------------------------------
# Accessible at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# -------------------------------------------------------------------
# 📂 File Upload Configuration
# -------------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -------------------------------------------------------------------
# ☁️ Cloudflare R2 Configuration
# -------------------------------------------------------------------
cloudflare.r2.access.key=${R2_ACCESS_KEY}
cloudflare.r2.secret.key=${R2_SECRET_KEY}
cloudflare.r2.endpoint=${R2_ENDPOINT}
cloudflare.r2.bucket.name=${R2_BUCKET_NAME}

# -------------------------------------------------------------------
# 🎨 Thymeleaf Configuration
# -------------------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# -------------------------------------------------------------------
# 🛡️ Security Configuration
# -------------------------------------------------------------------
# Enable H2 console access through Spring Security if needed (handled in SecurityConfig)
spring.main.allow-bean-definition-overriding=true
