# ===================================================================
# EduFlow LMS — Application Configuration
# ===================================================================
# This file contains the main settings for your project, including
# database connections, security keys, and file upload limits.
#
# Use this file to customise the app for your school's environment.
# ===================================================================

# --- General ---
spring.application.name=EduFlow LMS
server.port=8080

# --- Security ---
# Change this key to something unique and secret for your school!
# It's used to securely encrypt "remember me" cookies.
app.security.remember-me-key=4da9e5af-13c4-48a2-a840-f3d8d30b210d-secret-key

# --- Database (H2) ---
# This is where your school's data is stored. By default, it's saved
# to a folder called /data/lmsdb inside your project.
spring.datasource.url=jdbc:h2:file:./data/lmsdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Hibernate / JPA ---
# Set to 'update' to automatically create/modify database tables.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=true

# --- Thymeleaf ---
# Set cache to 'true' in production for better performance.
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- File Upload Limits ---
# Controls how large files (assignments, materials) can be.
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- Directories ---
# This is where uploaded files are saved on your computer.
app.upload.dir=./uploads

# --- Logging ---
logging.level.org.springframework.security=INFO
